---
# Phase toggles for playbooks/provision_sparks.yml.
# The Spark stack is **container-only** (NGC nvcr.io/nvidia/vllm). The bare-metal
# venv and custom-built Docker image paths have been removed — see
# llmwiki/concepts/ngc-stacked-container-stack.md and
# llmwiki/runs/2026-04-18-rip-out-bare-metal.md.

spark_provision_sudoers: true
spark_provision_cuda_apt_cleanup: true
spark_provision_apt: true
# Kernel pin / apt-hold / NVIDIA OTA service mask (roles/spark_kernel).
# Defaults are flag-driven and idempotent: with the role's own defaults the
# only change made on a fresh host is masking nvidia-spark-run-apt-upgrade.service
# and holding the HWE meta packages — no kernel pin until you set
# `spark_kernel_pin` in inventory. See roles/spark_kernel/README.md.
spark_provision_kernel: true
spark_provision_docker: true
spark_provision_firewall: true
# LAN IPv6-off — NetworkManager ipv6.method disabled + sysctl pair (see tasks/lan_ipv6_*.yml).
# Inventory: spark_lan_disable_ipv6_on_interface in group_vars/sparks.yml (both Sparks today).
spark_provision_lan_ipv6_sysctl: true
# /etc/hosts interconnect aliases (gx10-*, nvidia*) — roles/spark_hosts
spark_provision_hosts: true
# CUDA toolkit on the host is no longer needed for vLLM (NGC image is self-contained).
# Enable only if you also run playbooks/nccl_sparks.yml (host-side NCCL build).
spark_provision_cuda_toolkit: false
# NGC stacked vLLM (Docker Ray head + worker + `vllm serve`) — the only supported path.
spark_provision_vllm_stacked_container: true
# Leader-only systemd daemon that keeps configured OCI images current
# (NGC vLLM, etc.) and rsyncs new tags to peer Sparks over the QSFP
# interconnect. Polls weekly by default.
spark_provision_ngc_image_sync: false
# Leader-only daemon that promotes a newer image into the running stack
# after stabilization + 5-min quiet window on the vLLM API. Opt-in.
spark_provision_vllm_autoupgrade: false
# Optional — pre-download HF models into HF_HOME inside the NGC image (no host venv).
spark_provision_hf: false
# Optional — Docker + HF cache diagnostics.
spark_provision_diagnostics: false
# Push-based observability pipeline (roles/spark_observability) — node_exporter,
# dcgm-exporter, otel-agent, promtail, rasdaemon textfile shipper. All bind to
# 127.0.0.1; the otel-agent and promtail push to ms02 (192.168.1.189). Metrics
# at 15s; logs via journald. See roles/spark_observability/README.md.
spark_provision_observability: true
