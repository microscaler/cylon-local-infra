---
# Promtail in agent mode: scrapes journald (the unified log source — kernel
# + systemd + dockerd + every container via the journald log-driver) and
# pushes to Loki on ms02.

- name: promtail — check installed version
  ansible.builtin.command: "{{ spark_observability_bin_dir }}/promtail --version"
  register: spark_obs_promtail_version
  changed_when: false
  failed_when: false
  check_mode: false

- name: promtail — ensure unzip is present (extractor for the Loki release zip)
  ansible.builtin.apt:
    name: unzip
    state: present
    update_cache: false

- name: promtail — download zip
  ansible.builtin.get_url:
    url: "{{ spark_observability_promtail_url }}"
    dest: "/tmp/promtail-{{ spark_observability_promtail_version }}.zip"
    checksum: "sha256:{{ spark_observability_promtail_sha256 }}"
    mode: "0644"
    timeout: 180
  check_mode: false
  when: spark_observability_promtail_version not in (spark_obs_promtail_version.stdout | default(''))

- name: "promtail — extract binary (zip contains a single file: promtail-linux-arm64)"
  ansible.builtin.unarchive:
    src: "/tmp/promtail-{{ spark_observability_promtail_version }}.zip"
    dest: "{{ spark_observability_bin_dir }}"
    remote_src: true
    owner: root
    group: root
    mode: "0755"
  when: spark_observability_promtail_version not in (spark_obs_promtail_version.stdout | default(''))

- name: promtail — rename to canonical /usr/local/bin/promtail
  ansible.builtin.command:
    cmd: mv -f {{ spark_observability_bin_dir }}/promtail-linux-arm64 {{ spark_observability_bin_dir }}/promtail
    creates: "{{ spark_observability_bin_dir }}/promtail"
  when: spark_observability_promtail_version not in (spark_obs_promtail_version.stdout | default(''))
  notify: restart promtail

- name: promtail — positions dir (writable by promtail user)
  ansible.builtin.file:
    path: /var/lib/promtail
    state: directory
    owner: "{{ spark_observability_promtail_user }}"
    group: "{{ spark_observability_promtail_user }}"
    mode: "0755"

- name: promtail — config
  ansible.builtin.template:
    src: promtail.config.yaml.j2
    dest: "{{ spark_observability_config_dir }}/promtail.config.yaml"
    owner: "{{ spark_observability_promtail_user }}"
    group: "{{ spark_observability_promtail_user }}"
    mode: "0640"
  notify: restart promtail

- name: promtail — systemd unit
  ansible.builtin.template:
    src: promtail.service.j2
    dest: /etc/systemd/system/promtail.service
    owner: root
    group: root
    mode: "0644"
  notify: restart promtail

- name: promtail — enable + start
  ansible.builtin.systemd:
    name: promtail.service
    enabled: true
    state: started
    daemon_reload: true
  when: not ansible_check_mode
