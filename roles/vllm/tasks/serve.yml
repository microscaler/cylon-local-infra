---
# Deploy and start vLLM systemd service (single-node API). Use from playbook with tasks_from=serve.yml on the chosen host only.

- name: Gather vLLM runtime library paths and cache dirs
  ansible.builtin.import_tasks: api_runtime_facts.yml

- name: Deploy vLLM API wrapper script (sets LD_LIBRARY_PATH for CUDA)
  ansible.builtin.template:
    src: run-vllm-api.sh.j2
    dest: "{{ vllm_wrapper_script }}"
    mode: "0755"
    owner: "{{ vllm_run_user if (vllm_run_user | default('') | length > 0) else omit }}"
    group: "{{ vllm_run_user if (vllm_run_user | default('') | length > 0) else omit }}"

- name: Deploy vLLM systemd unit
  ansible.builtin.template:
    src: vllm.service.j2
    dest: /etc/systemd/system/vllm.service
    mode: "0644"
  notify: reload systemd

- name: Flush handlers (systemd reload) before starting vLLM
  ansible.builtin.meta: flush_handlers

- name: Ensure vLLM service is started and enabled
  ansible.builtin.systemd:
    name: vllm
    state: started
    enabled: true
    daemon_reload: true
