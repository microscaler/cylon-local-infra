---
# Deploy stacked vLLM OpenAI API (leader only): TP + Ray executor. Expects spark_interconnect_ip.

- name: Stacked vLLM API (tagged for vllm_stack / stack)
  tags: [stack, vllm_stack]
  block:
    - name: Gather vLLM runtime library paths and cache dirs
      ansible.builtin.import_tasks: api_runtime_facts.yml

    - name: Deploy stacked vLLM API wrapper script
      ansible.builtin.template:
        src: run-vllm-api-stacked.sh.j2
        dest: "{{ vllm_wrapper_script_stacked }}"
        mode: "0755"
        owner: "{{ vllm_run_user if (vllm_run_user | default('') | length > 0) else omit }}"
        group: "{{ vllm_run_user if (vllm_run_user | default('') | length > 0) else omit }}"
      notify: reload systemd

    - name: Deploy stacked vLLM systemd unit
      ansible.builtin.template:
        src: vllm-stacked.service.j2
        dest: /etc/systemd/system/vllm-stacked.service
        mode: "0644"
      notify: reload systemd

    - name: Flush handlers (systemd reload) before starting stacked vLLM
      ansible.builtin.meta: flush_handlers

    - name: Clear failed state for vllm-stacked unit (if any)
      ansible.builtin.command: systemctl reset-failed vllm-stacked
      failed_when: false
      changed_when: false

    # Without no_block, Ansible waits for systemctl's start job. vLLM can sit in "activating" for a long time
    # (Ray placement, model download, engine init) or hit TimeoutStartSec=3600 — the play appears stuck.
    - name: Ensure stacked vLLM service is started and enabled (non-blocking start)
      ansible.builtin.systemd:
        name: vllm-stacked
        state: started
        enabled: true
        daemon_reload: true
        no_block: true
