---
# Ray status from leader (was playbooks/vllm_stack_verify_sparks.yml).

- name: Discover IPv4 on interconnect interface
  ansible.builtin.shell: |
    ip -4 -o addr show dev {{ nccl_interface }} 2>/dev/null | awk '{print $4}' | cut -d/ -f1
  register: vllm_verify_ic_ip_out
  changed_when: false

- name: Record interconnect IP
  ansible.builtin.set_fact:
    spark_interconnect_ip: "{{ vllm_verify_ic_ip_out.stdout | trim }}"

- name: Set Ray head socket
  ansible.builtin.set_fact:
    spark_ray_head_socket: "{{ hostvars[(groups['sparks'] | sort | first)].spark_interconnect_ip }}:{{ vllm_ray_port }}"

- name: Run ray status (leader venv)
  ansible.builtin.command:
    argv:
      - "{{ vllm_venv_path }}/bin/ray"
      - status
  environment:
    RAY_ADDRESS: "{{ spark_ray_head_socket }}"
  register: vllm_ray_status_out
  changed_when: false
  when: inventory_hostname == (groups['sparks'] | sort | first)

- name: Show ray status
  ansible.builtin.debug:
    msg: "{{ vllm_ray_status_out.stdout_lines | default([]) }}"
  when:
    - inventory_hostname == (groups['sparks'] | sort | first)
    - vllm_ray_status_out is defined
    - vllm_ray_status_out.stdout is defined
