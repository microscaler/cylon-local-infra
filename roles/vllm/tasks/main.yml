---
# Idempotent vLLM install: venv, pip install vLLM with CUDA, Ray. Runs as root or vllm_run_user.

- name: Install Python venv, pip, and dev headers (Python.h — required for Triton JIT on engine startup)
  ansible.builtin.apt:
    name:
      - python3-venv
      - python3-pip
      - python3-dev
    state: present
    update_cache: true

- name: Install git for pip VCS installs (Transformers from GitHub)
  ansible.builtin.apt:
    name: git
    state: present
  when: vllm_transformers_from_git | default(false) | bool

- name: vLLM install as runtime user (non-root)
  when: vllm_run_user | default('') | length > 0
  block:
    - name: Ensure vLLM venv parent directory exists (owned by runtime user)
      ansible.builtin.file:
        path: "{{ vllm_venv_path | dirname }}"
        state: directory
        mode: "0755"
        owner: "{{ vllm_run_user }}"
        group: "{{ vllm_run_user }}"

    - name: Create vLLM virtualenv
      ansible.builtin.command:
        cmd: "{{ vllm_python }} -m venv {{ vllm_venv_path }}"
        creates: "{{ vllm_venv_path }}/bin/python"
      become: true
      become_user: "{{ vllm_run_user }}"
      environment:
        HOME: "{{ vllm_working_directory }}"

    - name: Upgrade pip in vLLM venv
      ansible.builtin.pip:
        name: pip
        state: latest
        virtualenv: "{{ vllm_venv_path }}"
        virtualenv_command: "{{ vllm_python }} -m venv"
      become: true
      become_user: "{{ vllm_run_user }}"
      environment:
        HOME: "{{ vllm_working_directory }}"

    # PyPI's default torch is often CPU-only; install CUDA wheels from the PyTorch index first.
    - name: Install PyTorch CUDA stack before vLLM (cu130/cu124 index from group_vars)
      ansible.builtin.pip:
        name:
          - torch
          - torchvision
          - torchaudio
        state: present
        virtualenv: "{{ vllm_venv_path }}"
        virtualenv_command: "{{ vllm_python }} -m venv"
        extra_args: "--index-url {{ vllm_torch_extra_index_url }}"
      become: true
      become_user: "{{ vllm_run_user }}"
      environment:
        HOME: "{{ vllm_working_directory }}"
      when: vllm_torch_extra_index_url | length > 0

    - name: Install vLLM with PyTorch CUDA backend
      ansible.builtin.pip:
        name: "{{ vllm_package }}"
        state: present
        virtualenv: "{{ vllm_venv_path }}"
        virtualenv_command: "{{ vllm_python }} -m venv"
        extra_args: "--extra-index-url {{ vllm_torch_extra_index_url }}"
      become: true
      become_user: "{{ vllm_run_user }}"
      environment:
        HOME: "{{ vllm_working_directory }}"
      when: vllm_torch_extra_index_url | length > 0

    - name: Install vLLM (default PyTorch index)
      ansible.builtin.pip:
        name: "{{ vllm_package }}"
        state: present
        virtualenv: "{{ vllm_venv_path }}"
        virtualenv_command: "{{ vllm_python }} -m venv"
      become: true
      become_user: "{{ vllm_run_user }}"
      environment:
        HOME: "{{ vllm_working_directory }}"
      when: vllm_torch_extra_index_url | length == 0

    - name: Install Ray for multi-node vLLM
      ansible.builtin.pip:
        name: "{{ vllm_ray_package | default('ray') }}"
        state: present
        virtualenv: "{{ vllm_venv_path }}"
        virtualenv_command: "{{ vllm_python }} -m venv"
      become: true
      become_user: "{{ vllm_run_user }}"
      environment:
        HOME: "{{ vllm_working_directory }}"

    - name: Install extra pip packages for model compatibility (e.g. transformers for Gemma 4)
      ansible.builtin.pip:
        name: "{{ vllm_extra_pip_packages }}"
        state: present
        virtualenv: "{{ vllm_venv_path }}"
        virtualenv_command: "{{ vllm_python }} -m venv"
      become: true
      become_user: "{{ vllm_run_user }}"
      environment:
        HOME: "{{ vllm_working_directory }}"
      when: vllm_extra_pip_packages | default([]) | length > 0

    - name: Install Transformers from GitHub for Gemma 4 / gemma4 (overrides PyPI pin)
      ansible.builtin.pip:
        name: "{{ vllm_transformers_git_url }}"
        state: present
        virtualenv: "{{ vllm_venv_path }}"
        virtualenv_command: "{{ vllm_python }} -m venv"
      become: true
      become_user: "{{ vllm_run_user }}"
      environment:
        HOME: "{{ vllm_working_directory }}"
      when: vllm_transformers_from_git | default(false) | bool

- name: vLLM install as root (legacy)
  when: vllm_run_user | default('') | length == 0
  block:
    - name: Ensure vLLM venv parent directory exists
      ansible.builtin.file:
        path: "{{ vllm_venv_path | dirname }}"
        state: directory
        mode: "0755"

    - name: Create vLLM virtualenv
      ansible.builtin.command:
        cmd: "{{ vllm_python }} -m venv {{ vllm_venv_path }}"
        creates: "{{ vllm_venv_path }}/bin/python"

    - name: Upgrade pip in vLLM venv
      ansible.builtin.pip:
        name: pip
        state: latest
        virtualenv: "{{ vllm_venv_path }}"
        virtualenv_command: "{{ vllm_python }} -m venv"

    - name: Install PyTorch CUDA stack before vLLM (legacy root venv)
      ansible.builtin.pip:
        name:
          - torch
          - torchvision
          - torchaudio
        state: present
        virtualenv: "{{ vllm_venv_path }}"
        virtualenv_command: "{{ vllm_python }} -m venv"
        extra_args: "--index-url {{ vllm_torch_extra_index_url }}"
      when: vllm_torch_extra_index_url | length > 0

    - name: Install vLLM with PyTorch CUDA backend
      ansible.builtin.pip:
        name: "{{ vllm_package }}"
        state: present
        virtualenv: "{{ vllm_venv_path }}"
        virtualenv_command: "{{ vllm_python }} -m venv"
        extra_args: "--extra-index-url {{ vllm_torch_extra_index_url }}"
      when: vllm_torch_extra_index_url | length > 0

    - name: Install vLLM (default PyTorch index)
      ansible.builtin.pip:
        name: "{{ vllm_package }}"
        state: present
        virtualenv: "{{ vllm_venv_path }}"
        virtualenv_command: "{{ vllm_python }} -m venv"
      when: vllm_torch_extra_index_url | length == 0

    - name: Install Ray for multi-node vLLM
      ansible.builtin.pip:
        name: "{{ vllm_ray_package | default('ray') }}"
        state: present
        virtualenv: "{{ vllm_venv_path }}"
        virtualenv_command: "{{ vllm_python }} -m venv"

    - name: Install extra pip packages for model compatibility (legacy root venv)
      ansible.builtin.pip:
        name: "{{ vllm_extra_pip_packages }}"
        state: present
        virtualenv: "{{ vllm_venv_path }}"
        virtualenv_command: "{{ vllm_python }} -m venv"
      when: vllm_extra_pip_packages | default([]) | length > 0

    - name: Install Transformers from GitHub for Gemma 4 (legacy root venv)
      ansible.builtin.pip:
        name: "{{ vllm_transformers_git_url }}"
        state: present
        virtualenv: "{{ vllm_venv_path }}"
        virtualenv_command: "{{ vllm_python }} -m venv"
      when: vllm_transformers_from_git | default(false) | bool
