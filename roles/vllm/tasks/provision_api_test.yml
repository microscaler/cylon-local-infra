---
# Optional API smoke test (was tags vllm_test in playbooks/vllm_sparks.yml).

- name: Wait for vLLM API to be ready (model may download on first start)
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ vllm_api_port }}/v1/models"
    method: GET
    status_code: 200
    timeout: 10
  register: vllm_models
  until: vllm_models.status == 200
  retries: 60
  delay: 10
  when:
    - inventory_hostname == (groups['sparks'] | sort)[0]
    - vllm_sparks_deploy_single_node_service | default(true) | bool
  changed_when: false

- name: Test vLLM API with a minimal chat completion
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ vllm_api_port }}/v1/chat/completions"
    method: POST
    body_format: json
    body:
      model: "{{ vllm_default_model }}"
      messages: [{"role": "user", "content": "Say hello in one word."}]
      max_tokens: 10
    status_code: 200
    timeout: 30
  register: vllm_test
  when:
    - inventory_hostname == (groups['sparks'] | sort)[0]
    - vllm_sparks_deploy_single_node_service | default(true) | bool
  changed_when: false

- name: Show vLLM test response
  ansible.builtin.debug:
    msg: "vLLM test OK. Reply: {{ (vllm_test.json.choices | default([]) | first | default({})).message.content | default('(no content)') }}"
  when:
    - inventory_hostname == (groups['sparks'] | sort)[0]
    - vllm_sparks_deploy_single_node_service | default(true) | bool
    - vllm_test is defined
    - vllm_test.json is defined
