---
# Multi-node Ray + vllm-stacked (was playbooks/vllm_stack_sparks.yml).

- name: Reset Ray local state before stacked deploy (stale GCS / node_* cleanup)
  ansible.builtin.import_tasks: ray_reset_state.yml
  when: vllm_ray_reset_state_before_stack | default(true) | bool
  tags: [stack, vllm_stack, ray_reset]

- name: Assert vLLM venv exists
  ansible.builtin.stat:
    path: "{{ vllm_venv_path }}/bin/python"
  register: vllm_stack_venv_stat
  tags: [stack, vllm_stack]

- name: Fail if vLLM venv is missing
  ansible.builtin.fail:
    msg: >-
      vLLM venv not found at {{ vllm_venv_path }}.
      Enable spark_provision_vllm in provision_sparks (or run stack after vLLM phase).
  when: not vllm_stack_venv_stat.stat.exists
  tags: [stack, vllm_stack]

- name: Discover IPv4 on interconnect interface
  ansible.builtin.shell: |
    ip -4 -o addr show dev {{ nccl_interface }} 2>/dev/null | awk '{print $4}' | cut -d/ -f1
  register: vllm_stack_ic_ip_out
  changed_when: false
  tags: [stack, vllm_stack]

- name: Record interconnect IP for this host
  ansible.builtin.set_fact:
    spark_interconnect_ip: "{{ vllm_stack_ic_ip_out.stdout | trim }}"
  tags: [stack, vllm_stack]

- name: Fail if interconnect has no IPv4
  ansible.builtin.fail:
    msg: >-
      No IPv4 on {{ nccl_interface }} (spark_interconnect_ip empty).
      Bring up the QSFP link or override nccl_interface.
  when: spark_interconnect_ip | length == 0
  tags: [stack, vllm_stack]

- name: Set Ray head socket for worker and operators (leader interconnect, port)
  ansible.builtin.set_fact:
    spark_ray_head_socket: "{{ hostvars[(groups['sparks'] | sort | first)].spark_interconnect_ip }}:{{ vllm_ray_port }}"
  tags: [stack, vllm_stack]

- name: Stop and disable vllm.service on leader only (free port for stacked)
  ansible.builtin.systemd:
    name: vllm
    state: stopped
    enabled: false
  when:
    - inventory_hostname == (groups['sparks'] | sort | first)
    - vllm_stack_stop_single_node_service | default(true) | bool
  tags: [stack, vllm_stack]

- name: Install Ray head unit and start service
  ansible.builtin.include_role:
    name: vllm
    tasks_from: stack_ray_head.yml
  when: inventory_hostname == (groups['sparks'] | sort | first)
  tags: [stack, vllm_stack]

- name: Install Ray worker unit and start service
  ansible.builtin.include_role:
    name: vllm
    tasks_from: stack_ray_worker.yml
  when: inventory_hostname != (groups['sparks'] | sort | first)
  tags: [stack, vllm_stack]

- name: Install vllm-stacked unit and start service
  ansible.builtin.include_role:
    name: vllm
    tasks_from: stack_vllm.yml
  when: inventory_hostname == (groups['sparks'] | sort | first)
  tags: [stack, vllm_stack]
