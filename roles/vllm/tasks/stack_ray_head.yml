---
# Deploy Ray head on interconnect (leader only). Expects spark_interconnect_ip; set by provision_stack / spark_provision.
# Tags on this block ensure `ansible-playbook ... --tags vllm_stack` runs systemd start, not only reset tasks.

- name: Ray head stack (tagged for vllm_stack / stack)
  tags: [stack, vllm_stack]
  block:
    - name: Gather vLLM runtime library paths and cache dirs
      ansible.builtin.import_tasks: api_runtime_facts.yml

    - name: Deploy Ray head wrapper script
      ansible.builtin.template:
        src: ray-head.sh.j2
        dest: "{{ vllm_ray_head_script }}"
        mode: "0755"
        owner: "{{ vllm_run_user if (vllm_run_user | default('') | length > 0) else omit }}"
        group: "{{ vllm_run_user if (vllm_run_user | default('') | length > 0) else omit }}"
      notify: reload systemd

    - name: Deploy Ray head systemd unit
      ansible.builtin.template:
        src: ray-head.service.j2
        dest: /etc/systemd/system/ray-head.service
        mode: "0644"
      notify: reload systemd

    - name: Flush handlers (systemd reload) before starting Ray head
      ansible.builtin.meta: flush_handlers

    # After `ray stop` / unit stop with non-zero exit, systemd can leave `failed`; `state=started` alone may not recover.
    - name: Clear failed state for Ray head unit (if any)
      ansible.builtin.command: systemctl reset-failed ray-head
      failed_when: false
      changed_when: false

    - name: Ensure Ray head service is started and enabled
      ansible.builtin.systemd:
        name: ray-head
        state: started
        enabled: true
        daemon_reload: true
