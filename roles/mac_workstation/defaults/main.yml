---
# Defaults for the mac_workstation role.
#
# Scope: Mac-side, local-connection Ansible. Manages the minimal set of
# Mac configuration for NFSv4 of ms02:/home/casibbald/Workspace at
# ~/Workspace/remote (root:wheel mount stub). The SSHFS path that previously
# held this mount point has been retired (see docs/remote-dev.md + the
# workspace-mount-protocols wiki for the transition history).
#
# This role owns:
#   1. NFS mount directory ~/Workspace/remote (root:wheel; `just nfs-up`)
#   2. Spotlight exclusions (network FS indexing is a well-known disaster)
#   3. /etc/nfs.conf for NFSv4 idmap domain (client side of idmap)
#   4. /etc/hosts — short LAN names (ms02, Sparks) so tools work without mDNS/DNS
#   5. ~/.ssh/config — optional `Include ~/.ssh/config.d/*` (operator Host stanzas only; no managed tunnel)
#
# Out of scope for this role:
#   - ~/.zshrc edits (blast radius: all shell sessions)
#   - Homebrew package installs (separate role if/when we need it)
#   - Plain `Host ms02` / editor Remote-SSH stanzas (still operator-owned)
#   - /etc/fstab-style auto-mount (manual `just nfs-up` until proven stable)
#   - Actually mounting NFS (lifecycle owned by justfile, not Ansible)
#   - README/docs under ~/Workspace/remote or the stub — keep in-repo only
#
# Idempotent, safe to re-run. Each task has a narrow `become: true` where
# required rather than elevating the whole play.

mac_workstation_user: casibbald
mac_workstation_user_home: "/Users/{{ mac_workstation_user }}"

# ── Workspace mount points ────────────────────────────────────────────────
mac_workstation_workspace_root: "{{ mac_workstation_user_home }}/Workspace"
mac_workstation_nfs_mount: "{{ mac_workstation_workspace_root }}/remote"
mac_workstation_nfs_mount_owner: root
mac_workstation_nfs_mount_group: wheel

# ── Spotlight ─────────────────────────────────────────────────────────────
# Paths Spotlight should NEVER index. Remote filesystems cause mdworker
# storms that saturate the link and make Finder feel unresponsive.
mac_workstation_spotlight_excluded_paths:
  - "{{ mac_workstation_nfs_mount }}"

# ── NFSv4 client (macOS) ──────────────────────────────────────────────────
# Must match `nfs_server_idmap_domain` on ms02 (inventory/host_vars/ms02.yml)
# so NFSv4 idmap resolves `casibbald@microscaler.lan` symmetrically across
# the Mac/Linux UID mismatch (Mac 502 ↔ ms02 1000). Note: with sec=sys the
# server still uses raw UIDs for permission checks — the LAN export on ms02
# applies all_squash+anonuid=1000 to compensate.
mac_workstation_nfs4_domain: microscaler.lan

# Whether to manage /etc/nfs.conf. Leave on. File is tiny; our only line is
# the NFSv4 domain; we preserve other lines via lineinfile (not template).
mac_workstation_configure_nfs: true

# ── /etc/hosts (LAN short names) ───────────────────────────────────────────
# Managed block only — other lines in /etc/hosts are left untouched. IPs match
# llmwiki entities (ms02, nvidia1, nvidia2). Override in host_vars if your LAN
# differs.
mac_workstation_manage_etc_hosts: true
mac_workstation_etc_hosts_lines:
  - "192.168.1.189 ms02"
  - "192.168.1.104 nvidia1"
  - "192.168.1.229 nvidia2"

# ── SSH: fragment include + retired tunnel cleanup ────────────────────────
# UIs, NFS, and kubectl hit ms02 on the LAN (see docs/dev_hosts.md). This role
# only ensures `Include ~/.ssh/config.d/*` exists and removes the old
# `ms02-dev-tunnel` fragment if present.
mac_workstation_ssh_include_config_d: true
mac_workstation_retired_ssh_tunnel_fragment: "{{ mac_workstation_user_home }}/.ssh/config.d/ms02-dev-tunnel"
