---
# Mac-side workstation config — local-connection, per-task become.
#
# Runs: ansible-playbook playbooks/mac_workstation.yml --ask-become-pass
#   or: ansible-playbook playbooks/mac_workstation.yml --tags mdutil  (just Spotlight)
#   or: ansible-playbook playbooks/mac_workstation.yml --tags nfs     (just nfs.conf + mount-point)
#
# Check-mode friendly: `ansible-playbook playbooks/mac_workstation.yml --check --diff`

- name: Sanity-check that we're on macOS
  ansible.builtin.assert:
    that:
      - ansible_facts["system"] == "Darwin"
    fail_msg: "mac_workstation role targets Darwin only (got {{ ansible_facts['system'] }})"
    quiet: true

# ── Mount-point directories ──────────────────────────────────────────────
- name: Ensure workspace root exists
  ansible.builtin.file:
    path: "{{ mac_workstation_workspace_root }}"
    state: directory
    mode: "0755"
  tags: [mac, dirs]

- name: Stat ~/Workspace/remote before layout reconcile
  ansible.builtin.stat:
    path: "{{ mac_workstation_nfs_mount }}"
  register: ws_remote_stat
  tags: [mac, dirs, nfs]

- name: Detect NFS mounted on old /Users/Shared/cylon-ms02-workspace stub
  ansible.builtin.shell: |
    set -euo pipefail
    mount | grep -Fq "on /Users/Shared/cylon-ms02-workspace "
  args:
    executable: /bin/bash
  register: mac_nfs_legacy_shared_mounted
  changed_when: false
  failed_when: false
  tags: [mac, dirs, nfs]

- name: Fail if old shared stub is still mounted (run just nfs-down first)
  ansible.builtin.fail:
    msg: >-
      Unmount /Users/Shared/cylon-ms02-workspace first: `just nfs-down`, then re-run this playbook.
  when: mac_nfs_legacy_shared_mounted.rc == 0
  tags: [mac, dirs, nfs]

- name: Remove obsolete symlink ~/Workspace/remote -> /Users/Shared/cylon-ms02-workspace
  ansible.builtin.file:
    path: "{{ mac_workstation_nfs_mount }}"
    state: absent
  when:
    - ws_remote_stat.stat.exists | default(false)
    - ws_remote_stat.stat.islnk | default(false)
    - "'cylon-ms02-workspace' in (ws_remote_stat.stat.lnk_source | default(ws_remote_stat.stat.lnk_target | default('')))"
  tags: [mac, dirs, nfs]

- name: Ensure NFS mount point directory exists (root-owned stub for mount_nfs)
  become: true
  ansible.builtin.file:
    path: "{{ mac_workstation_nfs_mount }}"
    state: directory
    owner: "{{ mac_workstation_nfs_mount_owner }}"
    group: "{{ mac_workstation_nfs_mount_group }}"
    mode: "0755"
  tags: [mac, dirs, nfs]

# Ops docs belong in cylon-local-infra — never seed README.md here (it confused
# mounts + Cursor). When unmounted, README.md is local stub only; when mounted,
# this path is ms02 — skip delete while an active mount covers this path.
- name: Detect active NFS mount on ~/Workspace/remote
  ansible.builtin.shell: |
    set -euo pipefail
    stub="${MAC_NFS_STUB}"
    mount | grep -Fq "on ${stub} "
  environment:
    MAC_NFS_STUB: "{{ mac_workstation_nfs_mount }}"
  args:
    executable: /bin/bash
  register: mac_nfs_stub_mounted
  changed_when: false
  failed_when: false
  tags: [mac, dirs, nfs]

- name: Remove stray README.md from NFS stub when unmounted
  become: true
  ansible.builtin.file:
    path: "{{ mac_workstation_nfs_mount }}/README.md"
    state: absent
  when: mac_nfs_stub_mounted.rc != 0
  tags: [mac, dirs, nfs]

# ── Spotlight exclusions ─────────────────────────────────────────────────
# `mdutil -s <path>` prints the current indexing status. Parse to avoid
# needless state-changing `mdutil -X` invocations (which always print
# "Indexing and searching disabled." regardless of prior state, so their
# exit code is useless for idempotency).
- name: Probe Spotlight indexing status for each managed path
  ansible.builtin.command: "mdutil -s {{ item }}"
  register: mdutil_status
  loop: "{{ mac_workstation_spotlight_excluded_paths }}"
  changed_when: false
  failed_when: false
  tags: [mac, mdutil, spotlight]

- name: Disable Spotlight indexing on managed paths
  become: true
  ansible.builtin.command: "mdutil -X {{ item.item }}"
  loop: "{{ mdutil_status.results }}"
  when:
    - item.rc == 0
    - "'disabled' not in (item.stdout | lower)"
  loop_control:
    label: "{{ item.item }}"
  changed_when: true
  tags: [mac, mdutil, spotlight]

# ── /etc/nfs.conf — NFSv4 idmap domain ──────────────────────────────────
# Macs ship with an empty /etc/nfs.conf (or no file at all). The only key
# we need is `nfs.client.default_nfs4domain` so NFSv4 username mapping
# lines up with ms02's /etc/idmapd.conf. Use lineinfile to preserve any
# other config (user may hand-tune for other mounts).
- name: Ensure /etc/nfs.conf exists
  become: true
  ansible.builtin.file:
    path: /etc/nfs.conf
    state: touch
    owner: root
    group: wheel
    mode: "0644"
    modification_time: preserve
    access_time: preserve
  when: mac_workstation_configure_nfs
  changed_when: false
  tags: [mac, nfs, nfs_client]

- name: Set NFSv4 default domain on Mac client
  become: true
  ansible.builtin.lineinfile:
    path: /etc/nfs.conf
    regexp: '^\s*nfs\.client\.default_nfs4domain\s*='
    line: "nfs.client.default_nfs4domain = {{ mac_workstation_nfs4_domain }}"
    state: present
    owner: root
    group: wheel
    mode: "0644"
  when: mac_workstation_configure_nfs
  tags: [mac, nfs, nfs_client]

# ── /etc/hosts — LAN short names (ms02, Sparks) ───────────────────────────
# Single blockinfile block so re-runs stay idempotent; does not replace the file.
- name: Ensure static LAN names in /etc/hosts
  become: true
  ansible.builtin.blockinfile:
    path: /etc/hosts
    marker: "# {mark} ANSIBLE MANAGED — mac_workstation static LAN names"
    block: "{{ mac_workstation_etc_hosts_lines | join('\n') }}"
    insertafter: EOF
    create: false
  when:
    - mac_workstation_manage_etc_hosts | default(false)
    - (mac_workstation_etc_hosts_lines | default([])) | length > 0
  tags: [mac, hosts, etc_hosts]

# ── ~/.ssh — config.d include + remove retired ms02-dev-tunnel fragment ─────
# ms02 is reached on the LAN (no LocalForward/SOCKS in this repo). Operators
# keep their own `Host ms02` stanzas under ~/.ssh/config.d/.
- name: Ensure ~/.ssh directory exists
  ansible.builtin.file:
    path: "{{ mac_workstation_user_home }}/.ssh"
    state: directory
    mode: "0700"
  when: mac_workstation_ssh_include_config_d | default(true)
  tags: [mac, ssh, ssh_tunnel, tunnel]

- name: Ensure ~/.ssh/config.d exists
  ansible.builtin.file:
    path: "{{ mac_workstation_user_home }}/.ssh/config.d"
    state: directory
    mode: "0700"
  when: mac_workstation_ssh_include_config_d | default(true)
  tags: [mac, ssh, ssh_tunnel, tunnel]

- name: Ensure top-level ~/.ssh/config includes config.d fragments
  ansible.builtin.lineinfile:
    path: "{{ mac_workstation_user_home }}/.ssh/config"
    regexp: '(?i)^Include\s+~/.ssh/config\.d/\*'
    line: "Include ~/.ssh/config.d/*"
    insertbefore: BOF
    create: true
    mode: "0600"
  when: mac_workstation_ssh_include_config_d | default(true)
  tags: [mac, ssh, ssh_tunnel, tunnel]

- name: Remove retired ms02-dev-tunnel SSH fragment (LAN-only ms02 access)
  ansible.builtin.file:
    path: "{{ mac_workstation_retired_ssh_tunnel_fragment }}"
    state: absent
  tags: [mac, ssh, ssh_tunnel, tunnel]

# ── Diagnostic summary ───────────────────────────────────────────────────
- name: Summarize managed Mac-side state
  ansible.builtin.debug:
    msg:
      - "workspace root:   {{ mac_workstation_workspace_root }}"
      - "NFS  mount stub:  {{ mac_workstation_nfs_mount }}  (`just nfs-up`)"
      - "NFSv4 domain:     {{ mac_workstation_nfs4_domain }}"
      - "Spotlight excl.:  {{ mac_workstation_spotlight_excluded_paths | join(', ') }}"
      - "/etc/hosts:       {{ 'managed block (' ~ (mac_workstation_etc_hosts_lines | length | string) ~ ' lines)' if mac_workstation_manage_etc_hosts | default(false) else 'not managed by this role' }}"
      - "Hermes Web UI:    http://ms02:9119 on LAN (kubectl API https://ms02:38839 — see docs/dev_hosts.md)"
      - "SSH:              ~/.ssh/config.d/* for Host ms02 (operator-owned); retired ms02-dev-tunnel fragment removed if present"
  tags: [mac, summary]
