---
# Docker + vendored spark-vllm-docker scripts, driven by systemd on the leader. Invoked from playbooks/provision_sparks.yml when spark_provision_docker_vllm is true.

vllm_docker_install_path: /opt/spark-vllm-docker
vllm_docker_config_dir: /etc/spark-vllm-docker
vllm_docker_launcher_path: /usr/local/sbin/vllm-docker-launch.sh

vllm_docker_image: vllm-node
vllm_docker_container_name: vllm_node
# launch-cluster.sh default; align with firewall if you change it.
vllm_docker_master_port: 29501
# ConnectX RoCE twins — override from ibdev2netdev on each site.
vllm_docker_ib_if: "rocep1s0f1,roceP2p1s0f1"
# Empty uses nccl_interface from group_vars.
vllm_docker_eth_if: ""

vllm_docker_model: "QuantTrio/MiniMax-M2-AWQ"
vllm_docker_api_port: 8000
vllm_docker_api_host: "0.0.0.0"
vllm_docker_gpu_memory_utilization: "0.7"
vllm_docker_tensor_parallel: 2
vllm_docker_max_model_len: 128000
vllm_docker_load_format: "fastsafetensors"
# Extra tokens after base flags (tooling, parsers, etc.)
vllm_docker_extra_serve_args:
  - "--enable-auto-tool-choice"
  - "--tool-call-parser"
  - "minimax_m2"
  - "--reasoning-parser"
  - "minimax_m2_append_think"

vllm_docker_install_docker_ce: false
vllm_docker_stop_bare_metal_stack: true
# systemd runs launch-cluster as this user (needs docker + SSH to peers).
vllm_docker_systemd_user: "{{ spark_runtime_user | default('nvidia') }}"
vllm_docker_systemd_group: "docker"
vllm_docker_systemd_home: "{{ spark_runtime_home | default('/home/' ~ (spark_runtime_user | default('nvidia'))) }}"

vllm_docker_service_enabled: true
vllm_docker_service_state: started
