---
# Installs the hf-prefetch daemon on the leader Spark and ensures the HF
# cache directory exists on every host in the `sparks` group (so followers
# have a target for rsync).

- name: Set fact — leader host
  ansible.builtin.set_fact:
    hf_prefetch_leader: "{{ (groups['sparks'] | sort | first) }}"
  run_once: true

- name: Determine each host's IPv4 on the interconnect (for rsync targets)
  ansible.builtin.shell: |
    ip -4 -o addr show dev {{ nccl_interface }} 2>/dev/null | awk '{print $4}' | cut -d/ -f1
  args:
    executable: /bin/bash
  register: hf_prefetch_ic_ip_out
  changed_when: false
  check_mode: false

- name: Record interconnect IP for this host
  ansible.builtin.set_fact:
    hf_prefetch_interconnect_ip: "{{ hf_prefetch_ic_ip_out.stdout | trim }}"

- name: Ensure HF cache root directory exists on every Spark
  ansible.builtin.file:
    path: "{{ hf_prefetch_cache_dir }}"
    state: directory
    owner: "{{ hf_prefetch_run_user }}"
    group: "{{ hf_prefetch_run_group }}"
    mode: "0755"

# --------------------------------------------------------------------------- #
# The rest runs only on the leader.                                           #
# --------------------------------------------------------------------------- #

- name: Leader-only — install and configure hf-prefetch daemon
  when: inventory_hostname == hf_prefetch_leader
  block:

    - name: Install runtime dependencies (python3-yaml, rsync, openssh-client)
      ansible.builtin.apt:
        name:
          - python3-yaml
          - rsync
          - openssh-client
        state: present
        update_cache: false
      register: hf_prefetch_apt
      changed_when: hf_prefetch_apt.changed

    - name: Create install / config / state directories
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ item.owner | default('root') }}"
        group: "{{ item.group | default('root') }}"
        mode: "{{ item.mode | default('0755') }}"
      loop:
        - { path: "{{ hf_prefetch_install_dir }}" }
        - { path: "{{ hf_prefetch_config_dir }}" }
        - { path: "{{ hf_prefetch_state_dir }}",
            owner: "{{ hf_prefetch_run_user }}",
            group: "{{ hf_prefetch_run_group }}",
            mode: "0755" }

    - name: Deliver hf_prefetch_service.py
      ansible.builtin.copy:
        src: hf_prefetch_service.py
        dest: "{{ hf_prefetch_install_dir }}/hf_prefetch_service.py"
        owner: root
        group: root
        mode: "0755"
      notify: Restart hf-prefetch

    - name: Render daemon config (models + sync targets)
      ansible.builtin.template:
        src: config.yaml.j2
        dest: "{{ hf_prefetch_config_dir }}/config.yaml"
        owner: root
        group: "{{ hf_prefetch_run_group }}"
        mode: "0640"
      notify: Reload hf-prefetch config

    - name: Render systemd unit
      ansible.builtin.template:
        src: hf-prefetch.service.j2
        dest: "/etc/systemd/system/{{ hf_prefetch_unit_name }}"
        owner: root
        group: root
        mode: "0644"
      notify: Restart hf-prefetch

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable hf-prefetch service
      ansible.builtin.systemd:
        name: "{{ hf_prefetch_unit_name }}"
        enabled: "{{ hf_prefetch_enable | bool }}"

    - name: Start hf-prefetch service
      ansible.builtin.systemd:
        name: "{{ hf_prefetch_unit_name }}"
        state: started
      when: hf_prefetch_start | bool

    - name: (Optional) Wait for all configured models to be READY
      when:
        - hf_prefetch_wait_for_ready | bool
        - hf_prefetch_models | length > 0
      vars:
        _wanted: "{{ hf_prefetch_models | map('string') | list }}"
      ansible.builtin.command:
        cmd: >-
          python3 -c 'import json,sys; d=json.load(open("{{ hf_prefetch_state_file }}"));
          want=set({{ _wanted | to_json }});
          got={k for k,v in d.get("models",{}).items() if v.get("status")=="ready"};
          sys.exit(0 if want.issubset(got) else 1)'
      register: hf_prefetch_ready_probe
      retries: "{{ (hf_prefetch_wait_timeout_sec | int // 15) }}"
      delay: 15
      until: hf_prefetch_ready_probe.rc == 0
      changed_when: false
