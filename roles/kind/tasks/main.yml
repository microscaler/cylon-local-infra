---
# Install Kind binary (Kubernetes in Docker). Idempotent.
# Requires Docker. Cluster creation is manual or a separate play/tag.

- name: Set Kind OS and arch for download
  ansible.builtin.set_fact:
    kind_os: "{{ 'darwin' if ansible_facts['system'] == 'Darwin' else ('windows' if ansible_facts['system'] == 'Windows' else 'linux') }}"
    kind_arch: "{{ 'amd64' if ansible_facts['architecture'] == 'x86_64' else ('arm64' if ansible_facts['architecture'] == 'aarch64' else ansible_facts['architecture']) }}"

- name: Get installed Kind version (if present)
  ansible.builtin.command: "{{ kind_install_path }} version 2>/dev/null || true"
  register: kind_installed_version
  changed_when: false
  failed_when: false

- name: Download and install Kind binary
  ansible.builtin.get_url:
    url: "https://github.com/kubernetes-sigs/kind/releases/download/{{ kind_version }}/kind-{{ kind_os }}-{{ kind_arch }}"
    dest: "{{ kind_install_path }}"
    mode: "0755"
    force: true
  when: kind_version not in (kind_installed_version.stdout | default(''))

- name: Verify Kind works
  ansible.builtin.command: "{{ kind_install_path }} version"
  register: kind_verify
  changed_when: false
  failed_when: kind_verify.rc != 0

- name: Get existing Kind clusters
  ansible.builtin.command: "{{ kind_install_path }} get clusters -q"
  register: kind_clusters
  changed_when: false
  failed_when: false
  when: kind_create_cluster | default(false) | bool

- name: Create Kind cluster with Kubernetes 1.34.3 image
  ansible.builtin.command: "{{ kind_install_path }} create cluster --name {{ kind_cluster_name }} --image {{ kind_node_image }}"
  when:
    - kind_create_cluster | default(false) | bool
    - kind_cluster_name not in (kind_clusters.stdout_lines | default([]))
