---
# Sets spark_interconnect_ip (same logic as roles/vllm_docker_stack/tasks/preflight_interconnect.yml).

- name: Discover IPv4 on interconnect interface
  ansible.builtin.shell: |
    ip -4 -o addr show dev {{ nccl_interface }} 2>/dev/null | awk '{print $4}' | cut -d/ -f1
  args:
    executable: /bin/bash
  register: vllm_stacked_container_ic_ip_out
  changed_when: false
  check_mode: false

- name: Record interconnect IP for this host
  ansible.builtin.set_fact:
    spark_interconnect_ip: "{{ vllm_stacked_container_ic_ip_out.stdout | trim }}"

- name: Fail if interconnect has no IPv4
  ansible.builtin.fail:
    msg: >-
      No IPv4 on {{ nccl_interface }} (spark_interconnect_ip empty).
      Follow Connect two Sparks / QSFP setup.
  when: spark_interconnect_ip | length == 0
