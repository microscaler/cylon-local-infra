---
# NGC stacked Sparks — Docker Ray cluster + vllm serve (no systemd units for the stack).
# Reference: https://build.nvidia.com/spark/vllm/stacked-sparks

- name: Stop any legacy bare-metal Ray/vLLM systemd units (safe on clean hosts)
  ansible.builtin.import_tasks: stop_bare_metal_systemd.yml
  when: vllm_stacked_container_stop_bare_metal_systemd | bool

- name: Stop torchrun stack containers before Ray
  ansible.builtin.import_tasks: stop_torchrun_containers.yml
  when: vllm_stacked_container_stop_torchrun_containers | default(true) | bool

- name: Interconnect IPv4 for Ray and NCCL env templates
  ansible.builtin.import_tasks: preflight_interconnect.yml

- name: Set fact — head interconnect IP (Ray worker join address)
  ansible.builtin.set_fact:
    spark_ray_head_ip: "{{ hostvars[groups['sparks'] | sort | first].spark_interconnect_ip }}"

- name: Ensure install and config directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ vllm_stacked_container_install_dir }}"
    - "{{ vllm_stacked_container_config_dir }}"

# --- Qwen3 MoE patches: stage on host before docker run so the bind-mount
# has something to serve. Idempotent sync; new image → new patches → rerun
# just re-copies. See files/qwen_moe_patches/README.md.
- name: Ensure patches host directory exists
  ansible.builtin.file:
    path: "{{ vllm_stacked_container_qwen_moe_patches_host_dir }}"
    state: directory
    mode: "0755"
  when: vllm_stacked_container_qwen_moe_patches_enabled | bool

- name: Stage Qwen3 MoE patches + chat template onto Spark host
  ansible.builtin.copy:
    src: "qwen_moe_patches/{{ item }}"
    dest: "{{ vllm_stacked_container_qwen_moe_patches_host_dir }}/{{ item }}"
    mode: "0644"
  loop:
    - _triton_alloc_setup.py
    - _triton_alloc_setup.pth
    - unsloth.jinja
  when: vllm_stacked_container_qwen_moe_patches_enabled | bool

# Operator reference only; upstream URL path has moved (404) on some branches.
# Avoid repeated GETs when the file is already present (rate limits / blocks).
- name: Stat run_cluster.sh on host (skip download if present)
  ansible.builtin.stat:
    path: "{{ vllm_stacked_container_install_dir }}/run_cluster.sh"
  register: vllm_stacked_container_run_cluster_stat

- name: Download upstream run_cluster.sh (optional operator reference)
  ansible.builtin.get_url:
    url: "{{ vllm_stacked_container_run_cluster_url }}"
    dest: "{{ vllm_stacked_container_install_dir }}/run_cluster.sh"
    mode: "0755"
  when:
    - vllm_stacked_container_install_run_cluster_script | bool
    - not vllm_stacked_container_run_cluster_stat.stat.exists

- name: Pull NGC vLLM image
  ansible.builtin.command:
    cmd: docker pull {{ vllm_stacked_container_image }}
  register: vllm_stacked_container_pull_out
  changed_when: >-
    'Image is up to date' not in (
    (vllm_stacked_container_pull_out.stdout | default(''))
    ~ (vllm_stacked_container_pull_out.stderr | default(''))
    )
  when: vllm_stacked_container_pull_image | bool

- name: Deploy Ray head env file
  ansible.builtin.template:
    src: ngc-ray-head.env.j2
    dest: "{{ vllm_stacked_container_config_dir }}/head.env"
    mode: "0644"
  when: inventory_hostname == (groups['sparks'] | sort | first)

- name: Deploy Ray worker env file
  ansible.builtin.template:
    src: ngc-ray-worker.env.j2
    dest: "{{ vllm_stacked_container_config_dir }}/worker-{{ inventory_hostname }}.env"
    mode: "0644"
  when: inventory_hostname != (groups['sparks'] | sort | first)

- name: Deploy vLLM Ray env carry-over exclusion list (per-host NCCL_IB_GID_INDEX)
  ansible.builtin.copy:
    src: ray_non_carry_over_env_vars.json
    dest: "{{ vllm_stacked_container_config_dir }}/ray_non_carry_over_env_vars.json"
    mode: "0644"
  when: vllm_stacked_container_ray_nccl_gid_carryover_exclude | bool

# --- Ray head (leader only) ---
- name: Remove Ray head container when recreating
  ansible.builtin.command:
    cmd: docker rm -f "{{ vllm_stacked_container_ray_head_name }}"
  failed_when: false
  when:
    - inventory_hostname == (groups['sparks'] | sort | first)
    - vllm_stacked_container_recreate | bool

- name: Recreate cleanup — optional Ray tmp purge (leader)
  ansible.builtin.import_tasks: recreate_host_cleanup.yml
  when:
    - inventory_hostname == (groups['sparks'] | sort | first)
    - vllm_stacked_container_recreate | bool

- name: Inspect Ray head container state
  ansible.builtin.command:
    cmd: docker container inspect -f "{{ '{{' }}json .State.Running{{ '}}' }}" "{{ vllm_stacked_container_ray_head_name }}"
  register: vllm_stacked_container_head_running
  failed_when: false
  changed_when: false
  when: inventory_hostname == (groups['sparks'] | sort | first)

- name: Check GPU visibility inside running Ray head container
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - "{{ vllm_stacked_container_ray_head_name }}"
      - nvidia-smi
      - -L
  register: vllm_stacked_container_head_gpu_probe
  failed_when: false
  changed_when: false
  when:
    - inventory_hostname == (groups['sparks'] | sort | first)
    - vllm_stacked_container_head_running.rc == 0
    - (vllm_stacked_container_head_running.stdout | default("") | trim) == "true"

- name: Remove Ray head container when GPU is not visible (stale bind after driver/kernel churn)
  ansible.builtin.command:
    cmd: docker rm -f "{{ vllm_stacked_container_ray_head_name }}"
  register: vllm_stacked_container_head_gpu_recreate
  when:
    - inventory_hostname == (groups['sparks'] | sort | first)
    - vllm_stacked_container_head_gpu_probe is defined
    - vllm_stacked_container_head_gpu_probe.rc is defined
    - (vllm_stacked_container_head_gpu_probe.rc | int) != 0
    - not (vllm_stacked_container_recreate | bool)

- name: Note Ray head GPU stale recreate
  ansible.builtin.set_fact:
    vllm_stacked_container_head_gpu_stale: true
  when:
    - vllm_stacked_container_head_gpu_recreate is defined
    - vllm_stacked_container_head_gpu_recreate is changed

# Mirrors the worker's "reuse existing name" path. Without this, an Exited
# head container (e.g. after `just spark-vllm-stop` + reboot — `--restart
# unless-stopped` does not re-launch a manually-stopped container) blocks
# the next `docker run` below with "name already in use" and the head stays
# stopped. `docker start` is a no-op when the container is already running.
- name: Start stopped Ray head container (reuse existing name)
  ansible.builtin.command:
    cmd: docker start "{{ vllm_stacked_container_ray_head_name }}"
  register: vllm_stacked_container_head_docker_start
  when:
    - inventory_hostname == (groups['sparks'] | sort | first)
    - not (vllm_stacked_container_recreate | bool)
    - vllm_stacked_container_head_running.rc == 0
    - (vllm_stacked_container_head_running.stdout | default("") | trim) == "false"
  failed_when: false
  changed_when: vllm_stacked_container_head_docker_start.rc == 0

- name: Start Ray head container (NGC image, host network)
  ansible.builtin.shell: |
    set -euo pipefail
    docker run -d --restart unless-stopped \
      --name "{{ vllm_stacked_container_ray_head_name }}" \
      --entrypoint /bin/bash \
      --network host \
      --shm-size "{{ vllm_stacked_container_shm_size }}" \
      --gpus all \
      {{ ('--device ' + vllm_stacked_container_rdma_device_path + ' --cap-add IPC_LOCK --ulimit memlock=-1:-1') if (vllm_stacked_container_rdma_enabled | bool) else '' }} \
      --env-file "{{ vllm_stacked_container_config_dir }}/head.env" \
      -v "{{ vllm_stacked_container_hf_home }}:/root/.cache/huggingface" \
      {{ ('-v ' + vllm_stacked_container_config_dir + '/ray_non_carry_over_env_vars.json:/root/.config/vllm/ray_non_carry_over_env_vars.json:ro') if (vllm_stacked_container_ray_nccl_gid_carryover_exclude | bool) else '' }} \
      {{ ('-v ' + vllm_stacked_container_qwen_moe_patches_host_dir + ':' + vllm_stacked_container_qwen_moe_patches_container_dir + ':ro') if (vllm_stacked_container_qwen_moe_patches_enabled | bool) else '' }} \
      "{{ vllm_stacked_container_image }}" \
      -lc 'ray start --block --head --node-ip-address="{{ spark_interconnect_ip }}" --port="{{ vllm_ray_port }}" --dashboard-host="{{ vllm_stacked_container_dashboard_host }}" --dashboard-port="{{ vllm_stacked_container_dashboard_port | int }}"'
  args:
    executable: /bin/bash
  when:
    - inventory_hostname == (groups['sparks'] | sort | first)
    - vllm_stacked_container_recreate | bool
      or vllm_stacked_container_head_gpu_stale | default(false) | bool
      or vllm_stacked_container_head_running.rc != 0
      or (
        (vllm_stacked_container_head_running.stdout | default("") | trim) == "false"
        and (
          vllm_stacked_container_head_docker_start is not defined
          or vllm_stacked_container_head_docker_start.rc != 0
        )
      )
  register: vllm_stacked_container_head_start

- name: Wait for Ray GCS on head node
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ vllm_ray_port | int }}"
    delay: 3
    timeout: 300
  when: inventory_hostname == (groups['sparks'] | sort | first)

# --- Ray workers (followers) ---
- name: Remove Ray worker container when recreating
  ansible.builtin.command:
    cmd: docker rm -f "{{ vllm_stacked_container_ray_worker_name }}"
  failed_when: false
  when:
    - inventory_hostname != (groups['sparks'] | sort | first)
    - vllm_stacked_container_recreate | bool

- name: Recreate cleanup — optional Ray tmp purge (followers)
  ansible.builtin.import_tasks: recreate_host_cleanup.yml
  when:
    - inventory_hostname != (groups['sparks'] | sort | first)
    - vllm_stacked_container_recreate | bool

- name: Inspect Ray worker container state
  ansible.builtin.command:
    cmd: docker container inspect -f "{{ '{{' }}json .State.Running{{ '}}' }}" "{{ vllm_stacked_container_ray_worker_name }}"
  register: vllm_stacked_container_worker_running
  failed_when: false
  changed_when: false
  when: inventory_hostname != (groups['sparks'] | sort | first)

- name: Check GPU visibility inside running Ray worker container
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - "{{ vllm_stacked_container_ray_worker_name }}"
      - nvidia-smi
      - -L
  register: vllm_stacked_container_worker_gpu_probe
  failed_when: false
  changed_when: false
  when:
    - inventory_hostname != (groups['sparks'] | sort | first)
    - vllm_stacked_container_worker_running.rc == 0
    - (vllm_stacked_container_worker_running.stdout | default("") | trim) == "true"

- name: Remove Ray worker container when GPU is not visible (stale bind after driver/kernel churn)
  ansible.builtin.command:
    cmd: docker rm -f "{{ vllm_stacked_container_ray_worker_name }}"
  register: vllm_stacked_container_worker_gpu_recreate
  when:
    - inventory_hostname != (groups['sparks'] | sort | first)
    - vllm_stacked_container_worker_gpu_probe is defined
    - vllm_stacked_container_worker_gpu_probe.rc is defined
    - (vllm_stacked_container_worker_gpu_probe.rc | int) != 0
    - not (vllm_stacked_container_recreate | bool)

- name: Note Ray worker GPU stale recreate
  ansible.builtin.set_fact:
    vllm_stacked_container_worker_gpu_stale: true
  when:
    - vllm_stacked_container_worker_gpu_recreate is defined
    - vllm_stacked_container_worker_gpu_recreate is changed

# If a previous power-loss left a *stopped* worker container, `docker run` fails
# with "name already in use". Prefer `docker start` for that case.
- name: Start stopped Ray worker container (reuse existing name)
  ansible.builtin.command:
    cmd: docker start "{{ vllm_stacked_container_ray_worker_name }}"
  register: vllm_stacked_container_worker_docker_start
  when:
    - inventory_hostname != (groups['sparks'] | sort | first)
    - not (vllm_stacked_container_recreate | bool)
    - vllm_stacked_container_worker_running.rc == 0
    - (vllm_stacked_container_worker_running.stdout | default("") | trim) == "false"
  failed_when: false
  changed_when: vllm_stacked_container_worker_docker_start.rc == 0

- name: Start Ray worker container
  ansible.builtin.shell: |
    set -euo pipefail
    docker run -d --restart unless-stopped \
      --name "{{ vllm_stacked_container_ray_worker_name }}" \
      --entrypoint /bin/bash \
      --network host \
      --shm-size "{{ vllm_stacked_container_shm_size }}" \
      --gpus all \
      {{ ('--device ' + vllm_stacked_container_rdma_device_path + ' --cap-add IPC_LOCK --ulimit memlock=-1:-1') if (vllm_stacked_container_rdma_enabled | bool) else '' }} \
      --env-file "{{ vllm_stacked_container_config_dir }}/worker-{{ inventory_hostname }}.env" \
      -v "{{ vllm_stacked_container_hf_home }}:/root/.cache/huggingface" \
      {{ ('-v ' + vllm_stacked_container_config_dir + '/ray_non_carry_over_env_vars.json:/root/.config/vllm/ray_non_carry_over_env_vars.json:ro') if (vllm_stacked_container_ray_nccl_gid_carryover_exclude | bool) else '' }} \
      {{ ('-v ' + vllm_stacked_container_qwen_moe_patches_host_dir + ':' + vllm_stacked_container_qwen_moe_patches_container_dir + ':ro') if (vllm_stacked_container_qwen_moe_patches_enabled | bool) else '' }} \
      "{{ vllm_stacked_container_image }}" \
      -lc 'ray start --block --address="{{ spark_ray_head_ip }}:{{ vllm_ray_port }}" --node-ip-address="{{ spark_interconnect_ip }}"'
  args:
    executable: /bin/bash
  when:
    - inventory_hostname != (groups['sparks'] | sort | first)
    - vllm_stacked_container_recreate | bool
      or vllm_stacked_container_worker_gpu_stale | default(false) | bool
      or vllm_stacked_container_worker_running.rc != 0
      or (
        (vllm_stacked_container_worker_running.stdout | default("") | trim) == "false"
        and (
          vllm_stacked_container_worker_docker_start is not defined
          or vllm_stacked_container_worker_docker_start.rc != 0
        )
      )
  register: vllm_stacked_container_worker_start

- name: Pause for Ray worker registration before vLLM serve
  ansible.builtin.pause:
    seconds: "{{ vllm_stacked_container_ray_join_delay_sec | int }}"
  run_once: true
  when: vllm_stacked_container_start_api | bool

# --- Qwen3 MoE patch application (head + worker containers) ---
# Must happen AFTER Ray is started (so the containers exist) and BEFORE
# `vllm serve` spawns Ray actors that import the patched vLLM modules.
# Ray actors are fresh python subprocesses, so as long as the .py files
# on disk are patched at actor-spawn time, the first import sees the new
# code. `patch`/`cp` are idempotent (on repeat runs the diff no-applies
# cleanly; cp overwrites byte-identical files). We run this on ALL sparks
# so both the head and worker containers get the treatment in parallel.
- name: Apply NGC 26.03 image bolt-ons inside Ray containers (Triton shim + fastsafetensors)
  ansible.builtin.shell: |
    set +e
    cname="{{ (inventory_hostname == (groups['sparks'] | sort | first))
              | ternary(vllm_stacked_container_ray_head_name,
                        vllm_stacked_container_ray_worker_name) }}"
    docker exec "$cname" bash -lc '
      set +e
      PATCH_DIR="{{ vllm_stacked_container_qwen_moe_patches_container_dir }}"
      SP="$(python3 -c "import sysconfig;print(sysconfig.get_paths()[\"purelib\"])")"
      echo "[qwen-patch] site-packages: $SP"
      cd "$PATCH_DIR" || exit 0
      # Triton runtime allocator: replaces the NullAllocator with
      # torch.cuda.caching_allocator_alloc so fused-MoE kernels do not stall
      # on GB10s unified-memory allocator. The .pth auto-loads the .py on
      # interpreter start (site.py machinery). cp -f is idempotent.
      echo "[qwen-patch] installing triton allocator shim ..."
      cp -f _triton_alloc_setup.py _triton_alloc_setup.pth "$SP/"
      # NGC 26.03-py3 ships vllm without the fastsafetensors extra. Our
      # sparks.yml sets `--load-format fastsafetensors` (cold-load win for
      # 35B FP8, ~18 GB per rank), so bolt the package in here rather than
      # baking a custom image. Pure-Python wheel, deps already satisfied.
      if python3 -c "import fastsafetensors" 2>/dev/null; then
        echo "[qwen-patch] fastsafetensors: already present"
      else
        echo "[qwen-patch] installing fastsafetensors ..."
        pip install --no-cache-dir --quiet --disable-pip-version-check fastsafetensors \
          && echo "[qwen-patch] fastsafetensors: installed" \
          || echo "[qwen-patch] fastsafetensors: install FAILED"
      fi
      echo "[qwen-patch] done"
    ' || true
  args:
    executable: /bin/bash
  register: qwen_patch_out
  changed_when: "'fastsafetensors: installed' in (qwen_patch_out.stdout | default(''))"
  failed_when: false
  when:
    - vllm_stacked_container_qwen_moe_patches_enabled | bool
    - vllm_stacked_container_start_api | bool

- name: Show image bolt-on application log
  ansible.builtin.debug:
    var: qwen_patch_out.stdout_lines
  when:
    - vllm_stacked_container_qwen_moe_patches_enabled | bool
    - qwen_patch_out is defined
    - qwen_patch_out.stdout_lines is defined

- name: Drop host page caches on every Spark before vLLM serve
  ansible.builtin.import_tasks: drop_page_caches.yml
  when: vllm_stacked_container_start_api | bool

- name: Invalidate Triton JIT cache in Ray containers before vLLM serve
  ansible.builtin.import_tasks: triton_cache_invalidate.yml
  when: vllm_stacked_container_start_api | bool

- name: Check for vLLM serve in head container
  ansible.builtin.shell: |
    docker exec "{{ vllm_stacked_container_ray_head_name }}" bash -lc "pgrep -af '[v]llm serve' || true"
  args:
    executable: /bin/bash
  register: vllm_stacked_container_vllm_ps
  changed_when: false
  failed_when: false
  when:
    - inventory_hostname == (groups['sparks'] | sort | first)
    - vllm_stacked_container_start_api | bool

- name: Start vLLM OpenAI server inside head container (detached)
  # `docker exec -d` orphans the child shell's stdout/stderr — without this redirect
  # the output vanishes and any crash is undiagnosable. Tail the log with:
  #   ssh casibbald@<leader> 'docker exec {{ vllm_stacked_container_ray_head_name }} tail -f /root/vllm-serve.log'
  ansible.builtin.shell: |
    set -euo pipefail
    docker exec -d "{{ vllm_stacked_container_ray_head_name }}" bash -lc \
    'exec > /root/vllm-serve.log 2>&1; vllm serve "{{ vllm_default_model }}" --tensor-parallel-size {{ vllm_tensor_parallel_size | int }} --host "{{ vllm_stacked_container_api_host }}" --port {{ vllm_stacked_container_api_port | int }} --distributed-executor-backend ray{% if vllm_load_format | default("") | length > 0 %} --load-format {{ vllm_load_format }}{% endif %}{% if vllm_enforce_eager | default(false) | bool %} --enforce-eager{% endif %} {{ vllm_api_server_extra_args | default([]) | join(" ") }}'
  args:
    executable: /bin/bash
  when:
    - inventory_hostname == (groups['sparks'] | sort | first)
    - vllm_stacked_container_start_api | bool
    - vllm_stacked_container_vllm_ps.stdout | default("") | length == 0
  register: vllm_stacked_container_api_start

- name: Wait for vLLM OpenAI /v1/models on leader
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ vllm_stacked_container_api_port | int }}/v1/models"
    status_code: 200
  register: vllm_stacked_container_api_ready
  until: vllm_stacked_container_api_ready.status == 200
  retries: "{{ vllm_stacked_container_api_ready_retries | int }}"
  delay: "{{ vllm_stacked_container_api_ready_delay_sec | int }}"
  when:
    - inventory_hostname == (groups['sparks'] | sort | first)
    - vllm_stacked_container_start_api | bool
