---
# NVIDIA stacked Sparks — containerized Ray + vLLM (NGC image), Docker-managed (no systemd units).
# Playbook: https://build.nvidia.com/spark/vllm/stacked-sparks
# Networking / NCCL / firewall: unchanged — reuse nccl_interface + vllm_distributed_extra_env from group_vars.

vllm_stacked_container_install_dir: /opt/vllm-ngc-stacked
vllm_stacked_container_config_dir: /etc/vllm-ngc-stacked
# Upstream helper (foreground; optional — Ansible launches equivalent docker run -d).
vllm_stacked_container_run_cluster_url: "https://raw.githubusercontent.com/vllm-project/vllm/refs/heads/main/examples/online_serving/run_cluster.sh"
vllm_stacked_container_install_run_cluster_script: true

# NGC vLLM image (NVIDIA doc: export VLLM_IMAGE=nvcr.io/nvidia/vllm:25.11-py3)
vllm_stacked_container_image: "nvcr.io/nvidia/vllm:25.11-py3"

vllm_stacked_container_hf_home: "{{ vllm_hf_home | default(spark_runtime_home ~ '/.cache/huggingface') }}"
# Ray GCS port on the interconnect — firewall also opens it.
vllm_ray_port: 6379
vllm_stacked_container_shm_size: "10.24g"
# Fixed names for idempotent Ansible (upstream uses random node-* names).
vllm_stacked_container_ray_head_name: vllm-ngc-ray-head
vllm_stacked_container_ray_worker_name: "vllm-ngc-ray-worker-{{ inventory_hostname }}"

# API port the container binds. Open this in the firewall (inventory/group_vars/sparks.yml).
vllm_stacked_container_api_port: 8000
vllm_stacked_container_api_host: "0.0.0.0"

# Ray dashboard bind on the head node. Default is `localhost` upstream — too
# restrictive when we want to view the dashboard from operator hosts on the
# home LAN. 0.0.0.0 binds on every interface (including the host LAN), so
# `http://<spark-leader-lan-ip>:8265` works from any 192.168.1.0/24 host.
# Lock down with the firewall (`firewall_trusted_lan_cidr`) — port 8265 is
# allow-listed only for the trusted LAN, not the world.
vllm_stacked_container_dashboard_host: "0.0.0.0"
vllm_stacked_container_dashboard_port: 8265

# Recreate Ray containers when true (image/env change rollout).
vllm_stacked_container_recreate: false

# Recreate hygiene — GPU KV cache does not survive crashes (see README); these knobs
# clear host-side leftovers that confuse recovery / memory probes after `docker rm`.
# Disable with `-e vllm_stacked_container_drop_caches_before_recreate=false` if undesired.
vllm_stacked_container_drop_caches_before_recreate: true
# Optional: purge Ray session/socket dir on host (`docker rm` does not delete /tmp/ray).
vllm_stacked_container_clear_ray_tmp_before_recreate: false
vllm_stacked_container_ray_tmp_dir: /tmp/ray

# Stop/disable bare-metal systemd units (ray-head, ray-worker, vllm-stacked, vllm) before starting Docker Ray.
vllm_stacked_container_stop_bare_metal_systemd: true

# Pull NGC image during provision.
vllm_stacked_container_pull_image: true

# After Ray is up on the head node, run vLLM serve inside the head container (docker exec -d).
vllm_stacked_container_start_api: true
# Seconds to wait after worker container before API start (Ray worker join).
vllm_stacked_container_ray_join_delay_sec: 15

# vLLM Ray executor copies NCCL_* from the driver (leader) into remote workers —
# that overwrites follower-specific NCCL_IB_GID_INDEX from `--env-file`.
# Mount ray_non_carry_over_env_vars.json so workers keep per-host GID indices.
vllm_stacked_container_ray_nccl_gid_carryover_exclude: true

# --- RDMA (RoCE v2) device passthrough ---
# When true, Ray head/worker containers get access to the Mellanox verbs
# character devices under /dev/infiniband, CAP_IPC_LOCK for pinning the
# NCCL send/recv buffers, and an unlimited memlock rlimit. Required whenever
# `vllm_distributed_extra_env.NCCL_IB_DISABLE` is "0" (i.e. the RoCE fast path).
# Proven on 26.03-py3 / GB10 Blackwell 2026-04-19 — see
# llmwiki/runs/2026-04-19-roce-cutover.md. Bandwidth went from ~2 GB/s (TCP
# sockets) to ~13.9 GB/s (RoCE+GDR) on the 200 Gb/s QSFP fabric.
#
# Set to false to revert to the pure-socket path (also flip NCCL_IB_DISABLE=1
# and NCCL_NET_GDR_LEVEL=0 in inventory/group_vars/sparks.yml to match).
vllm_stacked_container_rdma_enabled: true
vllm_stacked_container_rdma_device_path: /dev/infiniband

# --- Qwen3 MoE patches for GB10 (vendored from spark-vllm-docker) ---
# When true, the role copies roles/vllm_stacked_container/files/qwen_moe_patches
# to /opt/vllm-stack/patches on each Spark, bind-mounts it read-only into each
# Ray container at /vllm-patches, and applies the patches inside the container
# before `vllm serve` starts. See that directory's README.md for what each
# patch does and the upstream tracking issues. Idempotent — reruns are no-ops.
# Set to false to skip, e.g. when upstream vLLM in the NGC image no longer
# needs them.
vllm_stacked_container_qwen_moe_patches_enabled: true
vllm_stacked_container_qwen_moe_patches_host_dir: /opt/vllm-stack/patches
vllm_stacked_container_qwen_moe_patches_container_dir: /vllm-patches
