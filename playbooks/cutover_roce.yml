---
# One-shot cutover playbook for the Spark RoCE data plane.
#
# Recreates both Ray containers with the current NCCL env vars + /dev/infiniband
# passthrough, then restarts `vllm serve` inside the head container. Use this
# whenever anything under `vllm_distributed_extra_env` in
# inventory/group_vars/sparks.yml changes (NCCL_IB_HCA, NCCL_IB_GID_INDEX,
# NCCL_NET_GDR_LEVEL, …) — the bare `--tags vllm_ngc_stack` path on
# playbooks/provision_sparks.yml is known to skip inner tasks due to an
# include_role tag-propagation issue, this play bypasses that.
#
# History:
#   2026-04-19 — initial cutover: TCP sockets → RoCE v2 + GPUDirect RDMA
#                (13.93 GB/s NCCL ceiling at active_mtu 1024).
#   2026-04-19 — dual-PCIe-path cutover: add the second PCIe view of Cage A
#                (roceP2p1s0f0) + jumbo MTU 9000 + pinned GID index 3.
#                New NCCL ceiling: 23.75 GB/s (+70 %).
#
# Usage (from the controller):
#   ansible-playbook playbooks/cutover_roce.yml
#
# Rollback (revert to single-PCIe-path socket fallback):
#   1) Edit inventory/group_vars/sparks.yml:
#        nccl_ib_hca: rocep1s0f0
#        NCCL_IB_DISABLE: "1"
#        NCCL_NET_GDR_LEVEL: "0"
#      and set vllm_stacked_container_rdma_enabled: false
#   2) ansible-playbook playbooks/cutover_roce.yml

- name: Spark cluster — cutover to RoCE v2 + GPUDirect RDMA
  hosts: sparks
  gather_facts: true
  become: true
  vars:
    vllm_stacked_container_recreate: true
  roles:
    - vllm_stacked_container
