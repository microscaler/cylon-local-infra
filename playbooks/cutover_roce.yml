---
# RETIRED — use playbooks/provision_sparks.yml (canonical).
#
#   just spark-provision-recreate
#   # or NCCL/env-only with assert:
#   just spark-provision --tags vllm_ngc_stack,vllm_container,spark_assert \
#     -e vllm_stacked_container_recreate=true
#
# This wrapper remains so old docs/scripts fail loudly with a pointer.

- name: Retired playbook — redirect to provision_sparks.yml
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Stop — cutover_roce.yml is retired
      ansible.builtin.fail:
        msg: >-
          playbooks/cutover_roce.yml is retired. Use:
            just spark-provision-recreate
          or:
            ansible-playbook playbooks/provision_sparks.yml -l sparks
              -e vllm_stacked_container_recreate=true
