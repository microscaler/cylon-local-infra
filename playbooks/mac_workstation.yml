---
# Configure the Mac dev workstation (picolino) — Mac-side counterpart to
# dev_hosts.yml / nfs_server.yml. Prepares the local filesystem, sudoers
# rules, and NFS client config so `just nfs-up` has a valid target.
#
# Local connection — no SSH, no remote Python interpreter. `become: true`
# is applied per-task where required, so most tasks run without sudo; the
# few that touch /etc/sudoers.d/, /etc/nfs.conf, `mdutil -X`, etc. will
# prompt for the sudo password.
#
# Role ordering matters:
#   1. mac_sudoers     — install NOPASSWD drop-in FIRST so subsequent
#                        become-tasks (mdutil -X, /etc/nfs.conf) can run
#                        without re-prompting within the same session
#                        (sudo caches creds for ~5 min anyway, but the
#                        drop-in makes operational recipes silent forever).
#   2. mac_workstation — ~/Workspace/remote NFS stub (root:wheel), Spotlight,
#                        /etc/nfs.conf, /etc/hosts, ~/.ssh Include config.d/*.
#
# Run:
#   ansible-playbook playbooks/mac_workstation.yml --ask-become-pass
#   ansible-playbook playbooks/mac_workstation.yml --check --diff              # preview
#   ansible-playbook playbooks/mac_workstation.yml --tags sudoers              # just NOPASSWD rules
#   ansible-playbook playbooks/mac_workstation.yml --tags mdutil               # just Spotlight
#   ansible-playbook playbooks/mac_workstation.yml --tags nfs_client           # just /etc/nfs.conf
#   ansible-playbook playbooks/mac_workstation.yml --tags etc_hosts            # just /etc/hosts LAN block
#   ansible-playbook playbooks/mac_workstation.yml --tags ssh_tunnel           # SSH include + remove retired fragment
#   ansible-playbook playbooks/mac_workstation.yml --tags dirs                 # just dirs + README

- name: Configure Mac dev workstation(s)
  hosts: macs
  gather_facts: true
  roles:
    - role: mac_sudoers
      tags: [mac, mac_sudoers, sudoers]
    - role: mac_workstation
      tags: [mac, mac_workstation]
