---
# Canonical DGX Spark provisioning — single entry point, end-to-end, with assert gate.
#
#   just spark-provision              # full reconcile + state assert (preferred)
#   just spark-provision-recreate     # full reconcile + force vLLM container recreate
#
# Advanced (escape hatch only — risks drift if used as daily driver):
#   ansible-playbook playbooks/provision_sparks.yml -l sparks --tags vllm_ngc_stack,spark_assert
#   ansible-playbook playbooks/provision_sparks.yml -l sparks -e spark_provision_assert=false
#
# Legacy one-shot playbooks (refresh_hf_prefetch.yml, cutover_roce.yml) are retired —
# use this playbook with -e overrides instead.
#
# Optional — NCCL host build / bench (not part of production stack):
#   ansible-playbook playbooks/nccl_sparks.yml

- name: Spark cluster — provision and assert
  hosts: sparks
  gather_facts: true
  become: true
  roles:
    - spark_provision
