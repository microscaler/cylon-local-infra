---
# Configure dev host(s) — ms02: remote IDE dev, Kind, act/buildx (see docs/dev_hosts.md).
# 1) Sudoers for dev user (e.g. casibbald)
# 2) Docker: daemon, groups (no docker.io — install CE first: playbooks/docker_dev_engine.yml)
# 3) Firewall: ufw with dev-port allows
# 4) Kind binary in /usr/local/bin
# 5) dev_workstation: inotify limits for Cursor/VS Code Remote-SSH
#
# Run (after Docker CE is installed on ms02):
#   ansible-playbook playbooks/dev_hosts.yml
#   ansible-playbook playbooks/dev_hosts.yml -l ms02
#   ansible-playbook playbooks/dev_hosts.yml -l ms02 --tags dev_workstation  # sysctls only

- name: Users, sudoers, Docker, firewall, Kind, remote-IDE tweaks on dev hosts
  hosts: dev_hosts
  roles:
    - sudoers
    - docker
    - firewall
    - kind
    - dev_workstation
