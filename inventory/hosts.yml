# DGX Spark hosts (nvidia1, nvidia2) for vLLM / NCCL
# Desktop dev host (ms02) for remote IDE and Kind server
# Mac dev workstation (picolino) for NFS client + local tooling config
all:
  children:
    sparks:
      hosts:
        nvidia1: {}
        nvidia2: {}
      # ansible_user / become: set in group_vars/sparks.yml (operator with sudo, or root)
    dev_hosts:
      hosts:
        ms02: {}
      vars:
        ansible_user: root
    # Public VPS that receives outbound reverse SSH tunnels from ms02 so the
    # operator can reach the dev host while away from the home LAN.
    tunnel_hubs:
      hosts:
        srv1719193:
          ansible_host: 76.13.1.95
      vars:
        ansible_user: root
    # Mac dev workstations — the operator's Mac(s). Ansible runs locally
    # (no SSH) and manages Mac-side config: NFS client mount points,
    # Spotlight exclusions, future /etc/nfs.conf for NFSv4 idmap. Kept in
    # a separate group so Linux-targeted playbooks (`-l dev_hosts`,
    # `-l sparks`) never accidentally apply to the Mac.
    macs:
      hosts:
        picolino:
          ansible_host: 127.0.0.1
          ansible_connection: local
      vars:
        ansible_user: casibbald
        # Mac sudo — each tasks/main.yml that needs it sets `become: true`
        # explicitly, so this default stays false. The operator will get
        # a sudo prompt for become tasks (or configure TouchID for sudo).
        ansible_become_method: sudo
