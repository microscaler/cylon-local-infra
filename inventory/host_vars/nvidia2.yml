# Follower (gx10-47b5). LAN IPv6-off default lives in inventory/group_vars/sparks.yml.

# RoCE v2 + IPv4 GID index for NCCL (`show_gids` → same IPv4 row style as nvidia1).
# Live check 2026-05-19: IPv4 RoCE **v2** on `rocep1s0f0` is index **3** (169.254.37.109).
# Earlier inventory used `"4"` when this host's table differed; pinning `"4"` today leaves no IPv4 v2 at
# index 4 → NCCL `ibv_modify_qp` / remote GID empty. Re-verify after FW or mlx5 churn — index can move.
spark_nccl_ib_gid_index: "3"

# QSFP link-local + stable names for Ray/GCS, NCCL OOB, and operator SSH (roles/spark_hosts).
spark_hosts_local_ip: "169.254.37.109"
spark_hosts_local_aliases:
  - gx10-47b5
  - nvidia2
spark_hosts_peer_ip: "169.254.102.149"
spark_hosts_peer_aliases:
  - gx10-e1ce
  - nvidia1

# --- Kernel pin (roles/spark_kernel) ---
# Cluster-wide pin: 6.17.0-1018-nvidia (4K) in group_vars/sparks.yml.
