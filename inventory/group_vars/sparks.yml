# Group vars for DGX Spark hosts (nvidia1, nvidia2) — container-only stack.
# Pattern: NGC nvcr.io/nvidia/vllm image, Docker Ray head + worker, `vllm serve`.
# Bare-metal venv and custom-image paths were removed 2026-04;
# see llmwiki/runs/2026-04-18-rip-out-bare-metal.md.

# --- Ansible control plane (operator laptop / CI) ---
# Playbooks always connect FROM the controller TO each Spark (this is not Spark-to-Spark).
# Default login is casibbald (passwordless sudo). Override with -e spark_ansible_user=root
# if you prefer root SSH. Do NOT use the `nvidia` runtime user as ansible_user — its
# sudo is deliberately narrow (apt / systemctl / journalctl only).
ansible_user: "{{ spark_ansible_user | default('casibbald') }}"
ansible_become: true
ansible_become_method: sudo

# Runtime user for Ray/vLLM/NCCL (inside / outside containers). HF cache lives under this user's home.
spark_runtime_user: nvidia
spark_runtime_home: "/home/{{ spark_runtime_user }}"

# Sudoers — nvidia is targeted NOPASSWD (apt + systemctl + journalctl); casibbald is full NOPASSWD.
sudoers_users:
  - name: nvidia
    groups: [sudo, docker, video, render, systemd-journal]
    rule: |
      Cmnd_Alias NVIDIA_PKG = /usr/bin/apt, /usr/bin/apt-get, /usr/bin/dpkg
      Cmnd_Alias NVIDIA_SVC = /usr/bin/systemctl, /bin/systemctl
      Cmnd_Alias NVIDIA_LOG = /usr/bin/journalctl, /bin/journalctl
      nvidia ALL=(ALL) NOPASSWD: NVIDIA_PKG, NVIDIA_SVC, NVIDIA_LOG
  - name: casibbald
    groups: [sudo, docker, video, render]

sudoers_ensure_users: true
sudoers_user_groups: [sudo]

# APT maintenance — roles/spark_apt (refresh indices + upgrade). Kept-back packages may need full/dist mode.
spark_apt_upgrade_enabled: true
spark_apt_upgrade_mode: safe
spark_apt_cache_valid_time: 0
spark_apt_autoremove: false

# Docker: use the engine from the DGX / NVIDIA platform image. Do NOT apt-install docker.io.
docker_install_packages: false
docker_group_users: [nvidia, casibbald]
docker_packages: []
docker_daemon_config: {}

# CUDA: host-side toolkit is NOT required for the container stack (NGC image is self-contained).
# Variables below are kept for playbooks/nccl_sparks.yml which builds NCCL on the host.
cuda_keyring_url: "https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/sbsa/cuda-keyring_1.1-1_all.deb"
cuda_toolkit_package: "cuda-toolkit-13-0"
cuda_extra_packages: []

# --- Spark interconnect (QSFP Direct-Attach-Copper to peer Spark) ---
# The Spark has ONE ConnectX-7 SuperNIC chip (shared Base GUID 30c59903003fe1cf
# per `mstflint -d 0000:01:00.0 q` and `mstflint -d 0002:01:00.0 q`) with TWO
# external QSFP cages (Cage A = front, Cage B = rear, per NVIDIA's build.nvidia.com
# "connect two sparks" playbook). Each cage is dual-attached to the Grace CPU via
# two independent PCIe Gen5 x4 paths — one per CPU socket — so each cage shows
# up in the kernel as two logical netdevs with different BDFs and MACs but the
# same underlying wire:
#
#   Cage A:  enp1s0f0np0  (BDF 0000:01:00.0, IB rocep1s0f0)
#         +  enP2p1s0f0np0 (BDF 0002:01:00.0, IB roceP2p1s0f0)
#   Cage B:  enp1s0f1np1  (BDF 0000:01:00.1, IB rocep1s0f1)
#         +  enP2p1s0f1np1 (BDF 0002:01:00.1, IB roceP2p1s0f1)
#
# Current topology: single DAC cable on Cage A between nvidia1 and nvidia2.
# Cage B is intentionally unused — dual-cage SuperNICs are designed for HA
# (active/standby uplinks to two different switches), not link aggregation to a
# single peer. We instead exploit the dual PCIe paths into Cage A to double the
# effective PCIe bandwidth feeding the 200 Gb/s wire. Measured: 13.9 GB/s
# (single PCIe path) → 23.75 GB/s (dual PCIe path, +70%) on 2 GiB NCCL
# all-reduce — the new ceiling is ~95 % of a single-link line rate.
# See llmwiki/runs/2026-04-19-dual-pcie-path-cutover.md for the full run.
#
# Fabric 1 = Cage A via PCIe path 1 (primary; also carries NCCL OOB/bootstrap
#            IP traffic over the QSFP socket transport).
#   netdev : enp1s0f0np0
#   IP     : 169.254.x.y/16 auto via IPv4 link-local (netplan 40-cx7.yaml)
#   MTU    : 9000 (jumbo) → RoCE active_mtu 4096 (was 1024 at MTU 1500)
#
# Fabric 2 = Cage A via PCIe path 2 (pure RDMA data plane, no socket traffic).
#            Ubuntu's NetworkManager left this netdev unmanaged by default, so
#            Ansible writes a persistent NM connection (ipv6 disabled to keep
#            the RoCE GID cache clean — a kernel-generated IPv6 privacy address
#            at GID index 0/1 was displacing the IPv4 GID we pin in NCCL).
#   netdev : enP2p1s0f0np0
#   IP     : 10.200.0.1/30 (nvidia1) / 10.200.0.2/30 (nvidia2) — set in host_vars
#   MTU    : 9000 → RoCE active_mtu 4096
#
# nccl_interface below = fabric 1 netdev; only used for NCCL_SOCKET_IFNAME
# (OOB bootstrap). Data path rides both PCIe paths via NCCL_IB_HCA.
nccl_interface: enp1s0f0np0
spark_interconnect_mtu: 9000

# Fabric 2 per-host IP is set in inventory/host_vars/nvidia{1,2}.yml.
spark_fabric2_netdev: enP2p1s0f0np0
spark_fabric2_ib_device: roceP2p1s0f0
spark_fabric2_cidr_prefix: 30
spark_fabric2_peer_network: "10.200.0.0/30"

# --- Dual-HCA feature flag ---
# Controls whether NCCL multi-rails across BOTH PCIe paths into Cage A
# (rocep1s0f0 + roceP2p1s0f0) or uses only the primary path (rocep1s0f0).
#
# Default = true  (dual-HCA) as of 2026-04-19 FP8 + patches cutover.
#
# History of this flag (full arc in llmwiki/runs/2026-04-19-dual-pcie-path-cutover.md
# and .../2026-04-19-qwen35-fp8-adoption.md):
#
#   2026-04-19 initial dual-rail cutover (BF16 Qwen3.6-35B-A3B):
#     raw NCCL all-reduce:  13.93 → 23.75 GB/s  (+70 %)
#     workload prefill   :  6897 → 5800 tok/s   (-16 %)
#     workload decode    :  ~45 tok/s (LPDDR5X wall either way)
#     decision: flip back to single-HCA — small per-layer AllReduce msgs saw
#     more latency from 2-rail coordination than bandwidth win.
#
#   2026-04-19 FP8 + MoE patches cutover (current):
#     Theory: the prefill regression above was NOT the multi-rail. The
#     spark-vllm-docker reference repo runs the same 2-Spark topology with
#     dual-HCA (rocep1s0f1,roceP2p1s0f1 in their case) at full speed — what
#     was actually slow in our BF16 run was the un-patched Triton fused_moe
#     kernel (PR #34279 regression) and the absent FlashInfer backend.
#     With all three missing optimizations in place (fix_slowness.diff,
#     FP8 weights/KV, FlashInfer), dual-HCA should be a pure win again.
#
# WHEN TO FLIP TO false:
#   * If post-cutover workload prefill regresses vs single-HCA, flip back.
#     All the fabric-2 plumbing (netplan MTU 9000, NM cx7-fabric2 connection,
#     static /30 IP, pinned GID index 3) stays provisioned either way.
#   * Decode is bandwidth-bound on LPDDR5X regardless; the flag doesn't move it.
#
# WHEN TO KEEP true:
#   * Full utilization of the 200 Gb/s QSFP wire for AllReduce-heavy prefill.
#   * A decode-side device joins the cluster (Mac Studio M5 Ultra @ 819 GB/s
#     memory bandwidth) and we switch to EXO-style disaggregated prefill/decode:
#     the Sparks handle compute-bound prefill, stream KV layer-by-layer to the
#     M5, which handles memory-bound decode at ~3× Spark throughput. Under
#     that regime, prefill becomes strictly bandwidth-bound on large
#     AllReduces — the +70 % NCCL headroom translates directly to TTFT.
spark_dual_hca_enabled: true

# --- NGC stacked container stack (roles/vllm_stacked_container) ---
# Image tag: pinned to match what is currently on the Sparks (nvidia1, nvidia2).
# 26.03-py3 unlocks Qwen3.6-35B-A3B (`Qwen3_5MoeForConditionalGeneration` is in
# vLLM 0.17.1's ModelRegistry and vllm's get_config loads the qwen3_5_moe
# architecture cleanly even though transformers 4.57.5 still lacks it in
# CONFIG_MAPPING). Also carries Qwen3-Next / Qwen3-VL-Moe / Qwen3-Omni arches
# for future use.
vllm_stacked_container_image: "nvcr.io/nvidia/vllm:26.03-py3"
# API port the container binds. Add this to firewall_allow_tcp_ports.
vllm_stacked_container_api_port: 8000
# Flip to true to force container recreation when the image tag or env-file changes.
vllm_stacked_container_recreate: false
# Model + TP configuration.
#
# CURRENT: Qwen/Qwen3.5-35B-A3B-FP8 — the exact model + quantization the
# spark-vllm-docker reference recipe runs (see that repo's
# recipes/qwen3.5-35b-a3b-fp8.yaml). FP8 cuts per-token memory bandwidth ~2×
# vs BF16, which is the lever that matters on GB10's 273 GB/s LPDDR5X decode
# wall (see blog.exolabs.net/nvidia-dgx-spark for the architectural story).
#
# Why not Qwen3.6-35B-A3B (the newer hybrid DeltaNet model we were running):
# it only ships in BF16 on HF at the moment, so decode is bandwidth-bound at
# ~6 GB/token/node → ~45 tok/s hard ceiling. FP8 halves that to ~3 GB/token
# → ~90 tok/s. When an FP8 variant of 3.6 lands we'll swap.
#
# Earlier blockers (preserved for institutional memory):
#   Gemma-4 — requires `vllm/vllm-openai:gemma4-cu130` (different image from NGC).
#   Gemma-3-27b-it — HF-gated, account not yet approved.
vllm_default_model: "Qwen/Qwen3.5-35B-A3B-FP8"
vllm_tensor_parallel_size: 2
# NGC 26.03-py3 ships vllm without the fastsafetensors extra (tested 2026-04-19:
# `ImportError: Please install vllm[fastsafetensors]`). The qwen-patch step in
# vllm_stacked_container does a `pip install fastsafetensors` inside both Ray
# containers on every cutover so this config stays aspirational and takes the
# cold-load win (~18 GB of FP8 weights per rank) without baking a custom image.
vllm_load_format: "fastsafetensors"
# Extra `vllm serve` args — tuned for full-cluster throughput.
#
# Context: 262144 = Qwen3.5-35B-A3B native max_position_embeddings (no rope
# extension). With FP8 weights + fp8 KV cache the per-token KV halves vs
# BF16, so max_model_len 262144 fits KV comfortably within the 70+ GiB cache
# vLLM provisions at init.
#
# The flag block below is the adopted full set from
# spark-vllm-docker/recipes/qwen3.5-35b-a3b-fp8.yaml — same image family
# (NGC vllm 26.03-py3), same GB10 architecture, same model. What each flag
# buys us (measurements in runs/2026-04-19-qwen35-fp8-adoption.md once we land):
#
#   --kv-cache-dtype fp8          : KV cache quantized to fp8_e4m3 — 2× more
#                                   KV capacity → 2× longer concurrent
#                                   sequences or 2× more in-flight requests.
#                                   GB10 has native fp8 arith, no accuracy hit.
#   --attention-backend flashinfer: FA3 kernels via FlashInfer, ~10-15 %
#                                   prefill speedup over vLLM's default on GB10.
#                                   Ships in NGC 26.03-py3.
#   --enable-prefix-caching       : dedup shared system-prompt / RAG-context
#                                   KV across requests. Huge TTFT win for
#                                   agent workloads that reuse prompts.
#   --chat-template /vllm-patches/unsloth.jinja
#                                 : Unsloth-fixed Qwen3.5 template (tool calls +
#                                   thinking tags) from spark-vllm-docker's
#                                   fix-qwen3.5-chat-template mod. Ships via
#                                   the qwen_moe_patches bind-mount.
#   --enable-auto-tool-choice     : make OpenAI-compat tools/function-calling
#                                   work automatically (paired with parser).
#   --tool-call-parser qwen3_coder: parses Qwen3-Coder's tool-call grammar.
#
# Throughput knobs:
#   --max-num-batched-tokens 16384 (8× the 2048 default) is the chunked-prefill
#     batch — bigger chunks = higher GB10 utilization at the cost of bigger
#     peak prefill memory, which FP8 gives us plenty of.
#   --max-num-seqs 128 — concurrent-sequence cap.
#
# Reasoning parser: qwen3 splits <think> into the OpenAI-compat
# `reasoning_content` field so coder / agent consumers can suppress the
# chain-of-thought monologue while keeping it available for debuggers.
#
# Revert to smoke defaults: clear this list and set
# vllm_default_model: "TinyLlama/TinyLlama-1.1B-Chat-v1.0".
vllm_api_server_extra_args:
  # Cursor IDE compatibility: advertise several aliases at /v1/models because
  # Cursor's custom-model validator lives on Cursor's cloud and checks against
  # a fixed server-side registry of known model ids — not a prefix pattern.
  # Empirically (cursor-guide research 2026-04-20) the following names are
  # rejected by the send-time validator even though Cursor's Add-Model field
  # accepts them at type time:
  #   - "Qwen/Qwen3.5-35B-A3B-FP8"  (slash is stripped)
  #   - "Qwen"                       (short bare name)
  #   - "qwen3"                       (no `qwen-*` escape hatch exists)
  # There is NO `custom-*` / `local-*` / `byok-*` prefix. Every self-hosted
  # vLLM / Ollama user today masquerades as a frontier-model name. We pick
  # `gpt-4o-mini` as the primary cover:
  #   - 128k advertised context (our --max-model-len 262144 ≥ that, so no
  #     truncation surprises from Cursor's side)
  #   - no vision injection (unlike gpt-4o)
  #   - no reasoning-mode request shape (unlike o3-mini / o4-mini)
  #   - widest compatibility across Cursor release channels
  # Caveat: Cursor's Agent/Composer mode refuses BYOK regardless of cover
  # name — Ask + Plan + Inline Edit only. That is a Cursor policy, not a
  # vLLM limitation.
  # vllm accepts `model: "gpt-4o-mini"` in the request body because it is
  # listed here; it still loads the real weights from vllm_default_model.
  # `qwen3` and the full HF repo id are kept so CLI / curl smoke tests
  # against /v1/models keep resolving.
  - "--served-model-name"
  - "gpt-4o-mini"
  - "qwen3"
  - "Qwen/Qwen3.5-35B-A3B-FP8"
  - "--max-model-len"
  - "262144"
  - "--gpu-memory-utilization"
  # 0.80 robust default with FP8 weights + dual-HCA + Ray + FlashInfer stack.
  # GB10 reports 119.61 GiB to CUDA (UMA: LPDDR5X shared CPU + GPU pool).
  # Measured free memory at vllm-serve startup:
  #   • 2026-04-19 fresh reboot, single-HCA           → ~111.5 GiB  → 0.92 fits
  #   • 2026-04-19 fresh reboot, dual-HCA             → ~109.0 GiB  → 0.92 OOMs
  #   • 2026-04-19 after a few cutover cycles         → ~109.5 GiB  → 0.92 OOMs
  #   • 2026-04-19 NGC 26.03 + FP8 + dual-HCA (post   → ~103.4 GiB  → 0.90 OOMs
  #     3h-long-stale container + cache drop, probe                    on both
  #     time is before CUDA/torch init settle)                          Sparks
  # Per-cutover CUDA/ibverbs state doesn't fully release, the 2nd HCA
  # statically pins ~2.5 GiB of MR caches / QP buffers, and NGC 26.03
  # carries slightly more baseline than 26.01. 0.80 (95.69 GiB) leaves
  # ~7.7 GiB margin even at the 103.4 GiB worst case — headroom for future
  # regressions in kernel/driver/NGC baseline without churning this config.
  # With FP8 weights we have ~35 GiB back vs BF16, and the reference recipe
  # runs 0.70 (~83 GiB); our 0.80 KV cache is still ~12 GiB larger than that.
  - "0.80"
  - "--max-num-batched-tokens"
  - "16384"
  - "--max-num-seqs"
  - "128"
  # --- FP8 model + KV cache + fast attention (from spark-vllm-docker recipe) ---
  - "--kv-cache-dtype"
  - "fp8"
  - "--attention-backend"
  - "flashinfer"
  - "--enable-prefix-caching"
  # --- Tool calling + Unsloth chat template ---
  # The jinja lives inside the Ray containers at /vllm-patches/unsloth.jinja
  # courtesy of the qwen_moe_patches bind-mount (roles/vllm_stacked_container).
  - "--chat-template"
  - "/vllm-patches/unsloth.jinja"
  - "--enable-auto-tool-choice"
  - "--tool-call-parser"
  - "qwen3_coder"
  - "--reasoning-parser"
  - "qwen3"
# Skip torch.compile / inductor kernels only if compilation fails on this GPU stack.
vllm_enforce_eager: false
# Ray GCS port (firewall + preflight). Container Ray still uses the same default.
vllm_ray_port: 6379
# HF cache path on host — mounted into the container at /root/.cache/huggingface.
vllm_hf_home: "{{ spark_runtime_home }}/.cache/huggingface"

# --- NCCL / distributed env (carried into head.env + worker-<host>.env) ---
# See llmwiki/concepts/ncclcommInitRank-abort-tp2.md and
# llmwiki/runs/2026-04-19-roce-cutover.md for the full arc.
#
# 2026-04-18 bring-up (TP=2 socket path):
#   NCCL_NET_PLUGIN=none disables external NCCL net plugins. The NGC image ships
#   four of them (aws-ofi-nccl, hpcx rdma-sharp, spectrum-x, ibext) that probe
#   RoCE/IB devices — on GB10 + ConnectX-7 link-local this aborts before NCCL's
#   own logger even starts. So: plugins off.
#   We also set NCCL_IB_DISABLE=1, forcing the fallback to NCCL's built-in TCP
#   socket transport over the QSFP IP. Rock-solid but slow.
#
# 2026-04-19 RoCE cutover (what the block below does today):
#   Measured all-reduce bandwidth on the 200 Gb/s QSFP: sockets ≈ 2.0 GB/s,
#   RoCE v2 + GPUDirect RDMA ≈ 13.9 GB/s (6.9× @ 1 GiB msgs, 12× @ 1 MiB msgs).
#   Prefill is network-bound (a 3001-token prefill pushed 2.08 GB through the
#   ring; TTFT dropped ~2× on long contexts after this change). Decode is
#   unchanged — it's memory-bandwidth bound on the GPU, not interconnect.
#
# KEY INSIGHT: NCCL_NET_PLUGIN=none is NOT the same as NCCL_IB_DISABLE=1.
#   "Plugin" = external tertiary NCCL extension (OFI / HPC-X / Spectrum-X / IB ext).
#   "IB"     = NCCL's *internal* verbs transport, statically linked.
#   The 26.01-py3 crash was inside the external OFI plugin. NCCL's internal IB
#   path is untouched by that bug. So we keep plugins off (belt + braces) and
#   flip ONLY NCCL_IB_DISABLE=0 to unlock RoCE safely on 26.03-py3.
#
# To roll back to the socket path, set NCCL_IB_DISABLE=1, NCCL_NET_GDR_LEVEL=0,
# and `vllm_stacked_container_rdma_enabled: false`, then rerun the role with
# --tags vllm_ngc_stack and `-e vllm_stacked_container_recreate=true`.
#
# RAY_CGRAPH_get_timeout: v1 compiled DAG default (300s) can kill TP workers on
# long steps, hence 900s.

# RoCE v2 HCA names (same on nvidia1 and nvidia2 — `rdma link show` on each).
# Derived from spark_dual_hca_enabled:
#   false → "rocep1s0f0"                  (single-HCA, workload-optimal today)
#   true  → "rocep1s0f0,roceP2p1s0f0"     (dual-HCA, for EXO-style disaggregated
#                                          prefill/decode when an M5 Ultra joins)
# Cage B (rocep1s0f1, roceP2p1s0f1) is intentionally not cabled — the dual-cage
# SuperNIC layout is for HA (two ToR switches), not bonding to a single peer.
nccl_ib_hca: "{{ 'rocep1s0f0,roceP2p1s0f0' if spark_dual_hca_enabled else 'rocep1s0f0' }}"

vllm_distributed_extra_env:
  # Bootstrap / out-of-band transports still ride the QSFP IP socket — NCCL
  # uses it for the ncclUniqueId exchange even when the data path is RDMA.
  NCCL_SOCKET_IFNAME: "{{ nccl_interface }}"
  GLOO_SOCKET_IFNAME: "{{ nccl_interface }}"
  UCX_NET_DEVICES: "{{ nccl_interface }}"
  OMPI_MCA_btl_tcp_if_include: "{{ nccl_interface }}"
  TP_SOCKET_IFNAME: "{{ nccl_interface }}"
  # --- RoCE v2 fast path (data plane) ---
  NCCL_IB_DISABLE: "0"                    # enable NCCL's built-in verbs transport
  NCCL_IB_HCA: "{{ nccl_ib_hca }}"        # single- or multi-rail, see spark_dual_hca_enabled
  # Pin the RoCE GID index to 3 = RoCE v2 + IPv4. Fabric 2 has no IPv4 GID at
  # index 0/1 (those are IPv6 link-local from MAC), so auto-selection picks
  # mismatched GIDs across nodes and QP creation fails with EINVAL. Index 3 is
  # the RoCE v2 IPv4 slot on BOTH HCAs on both Sparks — verified via
  # `show_gids` after provisioning. See llmwiki/runs/2026-04-19-dual-rail-cutover.md.
  NCCL_IB_GID_INDEX: "3"
  NCCL_NET_GDR_LEVEL: "PHB"               # GPUDirect RDMA: GPU↔NIC across PCIe host bridge.
                                          #   Per `nvidia-smi topo -m` the GB10 GPU
                                          #   sits at NODE distance from every NIC,
                                          #   so PHB is the permissive floor.
  # Keep external plugins off — the 26.01 abort was inside aws-ofi/hpcx/spectrum-x,
  # not inside NCCL's internal IB transport. Belt-and-braces until we re-qualify.
  NCCL_NET_PLUGIN: "none"
  # 2026-04-18 defensive pairings retained: no NVLink between separate Sparks,
  # no shm between separate nodes, no NVLS, and CUMEM off to dodge the 26.01 bug.
  NCCL_P2P_DISABLE: "1"
  NCCL_CUMEM_ENABLE: "0"
  NCCL_SHM_DISABLE: "1"
  NCCL_NVLS_ENABLE: "0"
  # WARN after the stack is stable; bump to INFO when diagnosing.
  NCCL_DEBUG: "WARN"
  # --- Tuning adopted from spark-vllm-docker/launch-cluster.sh ---
  # NCCL_IGNORE_CPU_AFFINITY=1 — don't let NCCL renumber our CPU masks; Ray
  # already pins actors to GB10 NUMA nodes and NCCL's affinity rewrites
  # conflict with Ray's placement, producing spurious socket re-pins.
  NCCL_IGNORE_CPU_AFFINITY: "1"
  # VLLM_MARLIN_USE_ATOMIC_ADD=1 — enable atomic-add reduction inside Marlin
  # FP8/INT4 GEMMs (big win on GB10 when many experts hit the same output).
  VLLM_MARLIN_USE_ATOMIC_ADD: "1"
  RAY_memory_monitor_refresh_ms: "0"
  RAY_CGRAPH_get_timeout: "900"
  # Ray prestarts 4 python workers per node at bring-up; each is ~200 MiB of
  # unified memory that never gets used by our 2-node TP cluster (vLLM talks
  # to named actors, not the worker pool). Disable.
  RAY_num_prestart_python_workers: "0"
  # Object store is the Ray shared-memory plasma pool. vLLM's NCCL AllReduce
  # path bypasses it entirely, and Ray's auto-sizing claims a big chunk of
  # /dev/shm. 1 GiB is plenty for the small control-plane objects Ray uses
  # internally.
  RAY_object_store_memory: "1073741824"

# --- NGC / OCI image sync daemon (roles/ngc_image_service) ---
# Leader-only systemd service that polls each tracked repo's Docker Registry v2
# tags/list endpoint, keeps the newest `keep_latest` matching tags pulled on
# nvidia1, replicates them to every peer Spark over the QSFP interconnect via
# `docker save | ssh nvidia@<peer-ic-ip> docker load`, and (opt-in) prunes
# stale tags not in use by any container. State lives at
# /var/lib/ngc-image-sync/state.json — poll it with `jq`.
#
# Add an image = edit ngc_image_sync_images + rerun Ansible. Daemon reloads on
# mtime change (no systemctl restart needed).
spark_provision_ngc_image_sync: true
ngc_image_sync_poll_interval_sec: 604800          # weekly (60 = 1 min for testing)
ngc_image_sync_images:
  - repo: "nvcr.io/nvidia/vllm"
    tag_pattern: '^\d{2}\.\d{2}-py3$'              # YY.MM-py3 only
    keep_latest: 2                                  # keep 2 newest matching tags
    # Always preserve the tag we're actually serving, even if a newer one lands.
    always_keep:
      - "{{ vllm_stacked_container_image | regex_replace('^[^:]+:', '') }}"
    prune_stale: false                              # flip to true once we trust the service

# --- Auto-upgrade the stacked vLLM container when ngc-image-sync lands a newer tag ---
# Leader-only systemd daemon (roles/vllm_stack_autoupgrade). Default disabled
# so image management stays separate from stack lifecycle. Once we trust the
# service, set `vllm_autoupgrade_enabled: true` to hand over cutover.
#
# Safety rails:
#   - stabilization_sec: tag must have been `ready` on all nodes for this long
#   - quiet_window_sec:  vLLM API must be quiescent (no in-flight or queued
#                        requests, no new completions) for this long
#   - pinned_tag:        if set, overrides "newest-ready" — lets operators roll
#                        back a surprise promotion by pinning the prior tag.
#   - Ansible still controls the service's `enabled:` flag via this inventory.
spark_provision_vllm_autoupgrade: true
# Armed 2026-04-19 after the 26.01 → 26.03 manual cutover baseline run
# ([runs/2026-04-19-26.03-py3-upgrade.md]). The bounce path the daemon will
# take is identical to what Ansible just did with `recreate=true`, and the
# stabilization + quiet-window gates add safety on top.
vllm_autoupgrade_enabled: true
vllm_autoupgrade_pinned_tag: ""          # e.g. "26.03-py3" to pin
vllm_autoupgrade_poll_interval_sec: 300  # 5 min
vllm_autoupgrade_stabilization_sec: 3600 # 1 h ready-time before promotion
vllm_autoupgrade_quiet_window_sec: 300   # 5 min quiet API before bouncing
vllm_autoupgrade_max_wait_for_quiet_sec: 86400  # give up after 24 h if busy

# --- Hugging Face prefetch daemon (roles/hf_prefetch_service) ---
# Downloads are driven by a long-running systemd service on the leader Spark.
# It reads /etc/hf-prefetch/config.yaml (rendered from hf_prefetch_models),
# downloads each model once via the NGC image's `hf` CLI, then rsyncs the
# repo's hub subtree to every other Spark over the QSFP interconnect as
# `nvidia@169.254.x` (key exchange already done by playbooks/nccl_sparks.yml).
# State is a pollable JSON file: /var/lib/hf-prefetch/state.json. Adding a
# model = edit this list + rerun ansible; the daemon picks up the config on
# its next poll cycle (no downtime, no blocking in Ansible).
#
# Poll readiness (leader):
#   ssh casibbald@nvidia1 'jq ".models" /var/lib/hf-prefetch/state.json'
#   ssh casibbald@nvidia1 'journalctl -u hf-prefetch -f'
spark_provision_hf: true
# Order matters — daemon processes sequentially. Qwen3.6 first because it's
# the current best-in-class coder (see concepts/qwen-model-ladder in the wiki
# for the comparison). Total WAN cost ≈ 130 GB; QSFP save/sync cost ≈ 300 s per
# model. Background; poll `jq .models /var/lib/hf-prefetch/state.json`.
hf_prefetch_models:
  - TinyLlama/TinyLlama-1.1B-Chat-v1.0            # keep, smoke model
  - Qwen/Qwen3.5-35B-A3B-FP8                      # primary target, matches spark-vllm-docker recipe
# Flip this to true in CI / blocking workflows to have Ansible wait for
# every model to land (default: false, returns immediately).
hf_prefetch_wait_for_ready: false

# --- Firewall (ufw) ---
firewall_default_incoming: deny
firewall_default_outgoing: allow
# Ray uses many TCP ports across Sparks; trust the full interconnect segment.
firewall_spark_interconnect_cidr: "169.254.0.0/16"
# Global allow list (any source). Port 8000 is the NGC container API port.
firewall_allow_tcp_ports: [22, "{{ vllm_ray_port }}", "{{ vllm_stacked_container_api_port }}"]
# Trust home/LAN for vLLM API + Ray + SSH (override if your subnet differs).
firewall_trusted_lan_cidr: "192.168.1.0/24"
firewall_trusted_lan_tcp_ports: [22, "{{ vllm_stacked_container_api_port }}", "{{ vllm_ray_port }}"]
