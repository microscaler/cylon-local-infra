[defaults]
inventory = inventory/hosts.yml
roles_path = roles
# Per-host/group ansible_user overrides this (see sparks in group_vars/sparks.yml).
remote_user = root
host_key_checking = False
stdout_callback = default
result_format = yaml
interpreter_python = auto_silent

[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
